<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0f08"/>
      <stop offset="100%" style="stop-color:#0d0805"/>
    </linearGradient>
    <linearGradient id="mine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="50%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#fcd34d"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d97706"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>
  <rect x="4" y="4" width="504" height="504" rx="106" fill="none" stroke="url(#ring)" stroke-width="5" opacity="0.7"/>

  <!-- Pickaxe — handle -->
  <line x1="160" y1="380" x2="330" y2="150" stroke="url(#mine)" stroke-width="14" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Pickaxe — head -->
  <path d="M305 170 C330 130 370 120 390 140 C395 145 390 160 375 165 L330 175 Z"
    fill="url(#mine)" opacity="0.9" filter="url(#glow)"/>
  <path d="M315 155 C300 125 305 90 330 80 C340 78 350 85 348 98 L335 145 Z"
    fill="url(#mine)" opacity="0.7"/>

  <!-- GSM coin -->
  <circle cx="180" cy="310" r="45" fill="none" stroke="url(#mine)" stroke-width="6" opacity="0.8" filter="url(#glow)"/>
  <circle cx="180" cy="310" r="35" fill="none" stroke="url(#mine)" stroke-width="2" opacity="0.4"/>
  <text x="180" y="322" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="800" font-size="36" fill="url(#mine)" opacity="0.9">G</text>

  <!-- Sparkle dots (mining particles) -->
  <circle cx="370" cy="100" r="4" fill="#fbbf24" opacity="0.5"/>
  <circle cx="400" cy="175" r="3" fill="#fcd34d" opacity="0.4"/>
  <circle cx="350" cy="85" r="3" fill="#f59e0b" opacity="0.4"/>
  <circle cx="130" cy="250" r="3" fill="#fbbf24" opacity="0.3"/>
</svg>
