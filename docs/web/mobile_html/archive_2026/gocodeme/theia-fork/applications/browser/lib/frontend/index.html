<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>GoCodeMe IDE</title>
</head>

<body>
    <div class="theia-preload"><!DOCTYPE html>
<html lang="en">

<head>
    <style>
        html,
        body {
            background-color: black;
        }

        .theia-preload {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            /* Above styles copied from https://github.com/eclipse-theia/theia/blob/5aeef6c0c683b4e91713ab736957e6655b486adc/packages/core/src/browser/style/index.css#L147-L151 */
            /* Otherwise, there is a flickering when Theia's CSS loads. */

            background-image: none;
        }

        .theia-preload::after {
            /* remove default loading animation */
            content: none;
        }

        .spinner-container {
            display: flex;
            flex-direction: center;
            align-self: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
        }

        .custom-spinner {
            align-self: center;
        }

        .custom-spinner svg {
            width: 16vw;
            height: 16vh;
            animation-delay: 0;
            animation-duration: 2s;
            animation-iteration-count: infinite;
            animation-name: gocodeme-spinner;
            animation-timing-function: ease;
        }

        @keyframes gocodeme-spinner {
            0% {
                filter: brightness(1);
                transform: scale(1.0);
            }

            50% {
                filter: brightness(1.3);
                transform: scale(0.85);
            }

            100% {
                filter: brightness(1);
                transform: scale(1.0);
            }
        }
    </style>
</head>

<body>
    <div class='spinner-container'>
        <div class='custom-spinner'>
            <svg id="spinner" version="1.1" xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 200 200" preserveAspectRatio="xMidYMid meet">
                <!-- Green hexagonal G — GoCodeMe branding -->
                <polygon points="100,10 178,55 178,145 100,190 22,145 22,55" fill="#2ecc71" stroke="none"/>
                <text x="100" y="135" text-anchor="middle" font-family="Arial, Helvetica, sans-serif"
                      font-size="120" font-weight="bold" fill="#FFFFFF">G</text>
            </svg>
        </div>
    </div>

    <script>
        if (document.head) {
            let link = document.createElement('link');
            link.rel = 'icon';
            link.href = '/favicon.ico';
            document.head.appendChild(link);
        }
    </script>
</body>

</html></div>
    <script type="text/javascript" src="./bundle.js" charset="utf-8"></script>
</body>

</html>
