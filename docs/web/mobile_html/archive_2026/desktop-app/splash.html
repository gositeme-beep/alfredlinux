<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Veil Browser — Loading</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    background: #0a0a1a;
    color: #e0e0ff;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    overflow: hidden;
    -webkit-app-region: drag;
}

.splash {
    text-align: center;
    animation: fadeIn 0.5s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

.logo-container {
    width: 120px;
    height: 120px;
    margin: 0 auto 30px;
    position: relative;
}

.logo-svg {
    width: 120px;
    height: 120px;
    animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
    0%, 100% { filter: drop-shadow(0 0 20px rgba(99, 102, 241, 0.5)); }
    50% { filter: drop-shadow(0 0 40px rgba(99, 102, 241, 0.8)); }
}

.title {
    font-size: 48px;
    font-weight: 300;
    letter-spacing: 12px;
    text-transform: uppercase;
    margin-bottom: 10px;
    background: linear-gradient(135deg, #6366f1, #a855f7, #ec4899);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.subtitle {
    font-size: 14px;
    color: #6366f1;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 40px;
    opacity: 0.7;
}

.loader {
    width: 200px;
    height: 3px;
    background: rgba(99, 102, 241, 0.15);
    border-radius: 3px;
    margin: 0 auto;
    overflow: hidden;
}

.loader::after {
    content: '';
    display: block;
    width: 60%;
    height: 100%;
    background: linear-gradient(90deg, #6366f1, #a855f7, #ec4899);
    border-radius: 3px;
    animation: loading 1.5s ease-in-out infinite;
}

@keyframes loading {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(250%); }
}

.version {
    margin-top: 20px;
    font-size: 11px;
    color: #334155;
    letter-spacing: 2px;
}

/* Background particles */
.particles {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: -1;
}

.particle {
    position: absolute;
    width: 2px;
    height: 2px;
    background: #6366f1;
    border-radius: 50%;
    animation: float 8s infinite;
    opacity: 0.3;
}

@keyframes float {
    0%, 100% { transform: translateY(0) translateX(0); }
    25% { transform: translateY(-30px) translateX(20px); }
    50% { transform: translateY(-10px) translateX(-15px); }
    75% { transform: translateY(-40px) translateX(10px); }
}
</style>
</head>
<body>
    <div class="particles">
        <div class="particle" style="top:10%;left:20%;animation-delay:0s"></div>
        <div class="particle" style="top:30%;left:60%;animation-delay:1s"></div>
        <div class="particle" style="top:50%;left:40%;animation-delay:2s"></div>
        <div class="particle" style="top:70%;left:80%;animation-delay:3s"></div>
        <div class="particle" style="top:20%;left:90%;animation-delay:0.5s"></div>
        <div class="particle" style="top:80%;left:15%;animation-delay:1.5s"></div>
        <div class="particle" style="top:40%;left:50%;animation-delay:2.5s"></div>
        <div class="particle" style="top:60%;left:70%;animation-delay:4s"></div>
    </div>

    <div class="splash">
        <div class="logo-container">
            <svg class="logo-svg" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#5b9cf5"/>
                        <stop offset="50%" style="stop-color:#7c5cfc"/>
                        <stop offset="100%" style="stop-color:#a855f7"/>
                    </linearGradient>
                    <linearGradient id="innerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#7cb8ff"/>
                        <stop offset="100%" style="stop-color:#c084fc"/>
                    </linearGradient>
                </defs>
                <!-- Shield -->
                <path d="M60 8 L105 28 L105 58 C105 82 85 102 60 112 C35 102 15 82 15 58 L15 28 Z"
                      fill="none" stroke="url(#shieldGrad)" stroke-width="2.5" opacity="0.9"/>
                <!-- A letterform -->
                <path d="M42 85 L60 30 L78 85" fill="none" stroke="url(#innerGrad)" stroke-width="4"
                      stroke-linecap="round" stroke-linejoin="round"/>
                <line x1="48" y1="65" x2="72" y2="65" stroke="url(#innerGrad)" stroke-width="2.5" opacity="0.8"/>
                <!-- Crown dots -->
                <circle cx="50" cy="20" r="2.5" fill="#5b9cf5" opacity="0.6"/>
                <circle cx="60" cy="16" r="3" fill="#7c5cfc" opacity="0.8"/>
                <circle cx="70" cy="20" r="2.5" fill="#a855f7" opacity="0.6"/>
            </svg>
        </div>
        <h1 class="title">Veil</h1>
        <p class="subtitle">Sovereign AI Browser</p>
        <div class="loader"></div>
        <p class="version">v3.0.0 — GoSiteMe.com</p>
    </div>
</body>
</html>
