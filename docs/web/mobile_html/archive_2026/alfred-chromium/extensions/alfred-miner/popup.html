<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 320px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a14; color: #e0e0f0; padding: 16px; }
.header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
.header img { width: 32px; height: 32px; }
.header h1 { font-size: 16px; font-weight: 600; }
.header .badge { font-size: 10px; padding: 2px 8px; border-radius: 10px; background: #10B981; color: #fff; }
.header .badge.off { background: #6b7280; }

.stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
.stat { background: rgba(255,255,255,0.05); border-radius: 10px; padding: 12px; text-align: center; }
.stat-label { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
.stat-value { font-size: 20px; font-weight: 700; margin-top: 4px; }
.stat-value.green { color: #10B981; }
.stat-value.blue { color: #3B82F6; }
.stat-value.purple { color: #8B5CF6; }
.stat-value.gold { color: #F59E0B; }

.toggle-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.toggle-label { font-size: 13px; }
.toggle { position: relative; width: 44px; height: 24px; cursor: pointer; }
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle .slider { position: absolute; inset: 0; background: #374151; border-radius: 12px; transition: 0.3s; }
.toggle .slider::before { content: ''; position: absolute; width: 18px; height: 18px; left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: 0.3s; }
.toggle input:checked + .slider { background: #10B981; }
.toggle input:checked + .slider::before { transform: translateX(20px); }

.throttle { margin-bottom: 16px; }
.throttle label { font-size: 11px; color: #888; display: flex; justify-content: space-between; margin-bottom: 4px; }
.throttle input[type="range"] { width: 100%; accent-color: #8B5CF6; }

.earnings { background: linear-gradient(135deg, rgba(139,92,246,0.15), rgba(16,185,129,0.15)); border: 1px solid rgba(139,92,246,0.3); border-radius: 12px; padding: 14px; text-align: center; margin-bottom: 12px; }
.earnings .amount { font-size: 24px; font-weight: 700; color: #F59E0B; }
.earnings .label { font-size: 11px; color: #888; margin-top: 2px; }

.footer { text-align: center; }
.footer a { color: #8B5CF6; text-decoration: none; font-size: 12px; }
.footer a:hover { text-decoration: underline; }
</style>
</head>
<body>
  <div class="header">
    <img src="icons/icon48.png" alt="Alfred Miner">
    <h1>Alfred Miner</h1>
    <span class="badge off" id="statusBadge">OFF</span>
  </div>

  <div class="toggle-row">
    <span class="toggle-label">Mining</span>
    <label class="toggle">
      <input type="checkbox" id="miningToggle">
      <span class="slider"></span>
    </label>
  </div>

  <div class="throttle">
    <label>
      <span>CPU Usage</span>
      <span id="throttleValue">30%</span>
    </label>
    <input type="range" id="throttleSlider" min="5" max="80" value="30" step="5">
  </div>

  <div class="earnings">
    <div class="amount" id="totalEarnings">0.000</div>
    <div class="label">GSM Earned</div>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-label">Hashrate</div>
      <div class="stat-value blue" id="hashrate">0 H/s</div>
    </div>
    <div class="stat">
      <div class="stat-label">Blocks</div>
      <div class="stat-value purple" id="blocks">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Total Hashes</div>
      <div class="stat-value green" id="hashes">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Revenue Split</div>
      <div class="stat-value gold">80/20</div>
    </div>
  </div>

  <div class="footer">
    <a href="https://gositeme.com/wallet" target="_blank">Open Full Wallet Dashboard →</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
