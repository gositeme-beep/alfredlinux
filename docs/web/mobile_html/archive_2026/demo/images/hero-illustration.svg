<?xml version="1.0" encoding="UTF-8"?>
<svg width="600" height="400" viewBox="0 0 600 400" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Background elements -->
    <circle cx="300" cy="200" r="180" fill="#F5F3FF" opacity="0.5"/>
    <circle cx="300" cy="200" r="140" fill="#DDD6FE" opacity="0.3"/>
    
    <!-- Server rack -->
    <rect x="250" y="120" width="100" height="160" rx="8" fill="#673DE6"/>
    <rect x="260" y="140" width="80" height="20" rx="4" fill="white"/>
    <rect x="260" y="170" width="80" height="20" rx="4" fill="white"/>
    <rect x="260" y="200" width="80" height="20" rx="4" fill="white"/>
    <rect x="260" y="230" width="80" height="20" rx="4" fill="white"/>
    
    <!-- Connection lines -->
    <path d="M350 160C400 160 420 120 450 120" stroke="#673DE6" stroke-width="2" stroke-dasharray="4 4"/>
    <path d="M350 200C400 200 420 240 450 240" stroke="#673DE6" stroke-width="2" stroke-dasharray="4 4"/>
    
    <!-- Cloud elements -->
    <circle cx="450" cy="120" r="20" fill="#673DE6" opacity="0.8"/>
    <circle cx="450" cy="240" r="20" fill="#673DE6" opacity="0.8"/>
    
    <!-- Floating elements -->
    <rect x="180" y="140" width="40" height="40" rx="8" fill="#673DE6" opacity="0.6"/>
    <rect x="160" y="200" width="30" height="30" rx="6" fill="#673DE6" opacity="0.4"/>
    <rect x="190" y="250" width="25" height="25" rx="5" fill="#673DE6" opacity="0.5"/>
    
    <!-- Security shield -->
    <path d="M450 170l15-15h30l15 15v30l-30 30l-30-30v-30z" fill="#673DE6" opacity="0.7"/>
    <path d="M465 185h30" stroke="white" stroke-width="2"/>
    <path d="M465 195h30" stroke="white" stroke-width="2"/>
    
    <!-- Speed indicators -->
    <circle cx="150" cy="150" r="10" fill="#673DE6" opacity="0.3"/>
    <circle cx="450" cy="300" r="15" fill="#673DE6" opacity="0.3"/>
    <circle cx="500" cy="180" r="12" fill="#673DE6" opacity="0.3"/>
</svg> 