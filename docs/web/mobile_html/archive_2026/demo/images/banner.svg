<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="600" viewBox="0 0 1200 600" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Background Gradient -->
    <defs>
        <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#F5F3FF;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#DDD6FE;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#673DE6;stop-opacity:0.1" />
            <stop offset="100%" style="stop-color:#673DE6;stop-opacity:0" />
        </linearGradient>
    </defs>
    
    <!-- Main Background -->
    <rect width="1200" height="600" fill="url(#grad1)"/>
    
    <!-- Abstract Shapes -->
    <circle cx="1000" cy="300" r="200" fill="url(#grad2)"/>
    <circle cx="900" cy="200" r="150" fill="#673DE6" fill-opacity="0.05"/>
    <circle cx="1100" cy="400" r="120" fill="#673DE6" fill-opacity="0.08"/>
    
    <!-- Floating Elements -->
    <circle cx="950" cy="150" r="4" fill="#673DE6" fill-opacity="0.3"/>
    <circle cx="1050" cy="250" r="4" fill="#673DE6" fill-opacity="0.3"/>
    <circle cx="900" cy="350" r="4" fill="#673DE6" fill-opacity="0.3"/>
    <circle cx="1000" cy="450" r="4" fill="#673DE6" fill-opacity="0.3"/>
    
    <!-- Lines -->
    <path d="M 850 100 Q 950 200 850 300" stroke="#673DE6" stroke-width="1" stroke-opacity="0.1" fill="none"/>
    <path d="M 1050 200 Q 950 300 1050 400" stroke="#673DE6" stroke-width="1" stroke-opacity="0.1" fill="none"/>
    
    <!-- Small Decorative Circles -->
    <g transform="translate(800, 100)">
        <circle r="20" fill="#673DE6" fill-opacity="0.05"/>
        <circle r="10" fill="#673DE6" fill-opacity="0.1"/>
    </g>
    <g transform="translate(1100, 300)">
        <circle r="15" fill="#673DE6" fill-opacity="0.05"/>
        <circle r="7" fill="#673DE6" fill-opacity="0.1"/>
    </g>
    <g transform="translate(900, 450)">
        <circle r="25" fill="#673DE6" fill-opacity="0.05"/>
        <circle r="12" fill="#673DE6" fill-opacity="0.1"/>
    </g>
</svg> 