label live-amd64
        menu label ^Alfred Linux 7.77 GA (Live)
        menu default
        kernel /live/vmlinuz
        append initrd=/live/initrd.img boot=live config quiet splash

label live-amd64-failsafe
        menu label ^Alfred Linux 7.77 GA (Safe Mode)
        kernel /live/vmlinuz
        append initrd=/live/initrd.img boot=live config nomodeset vga=normal
