# Wave 2 — static hook sweep + optional shellcheck on helper scripts.
name: security-audit

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Kingdom hooks sync (config/hooks/live → build/config/hooks)
        run: |
          mkdir -p build/config/hooks
          bash scripts/sync-hooks-to-build.sh
          for f in config/hooks/live/*.hook.chroot; do
            b=$(basename "$f")
            test -f "build/config/hooks/$b" || { echo "missing after sync: $b" >&2; exit 1; }
          done

      - name: Repo metadata (bible_tongues vs languages.conf)
        run: bash scripts/release-integrity.sh check-repo

      - name: Install shellcheck
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends shellcheck

      - name: Run scripts/security-audit.sh
        run: bash scripts/security-audit.sh
