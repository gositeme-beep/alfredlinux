menu hshift 0
menu width 82
menu title Alfred Linux 7.77 - Advanced Options (BIOS777)
include stdmenu.cfg

label adv_live_forensic
        menu label ^1. Live (forensic - no auto-mount/swap/network)
        kernel /live/vmlinuz
        append initrd=/live/initrd.img boot=live quiet loglevel=3 config noeject noprompt nopersistence noswap nonetworking module=forensic security=apparmor username=alfred nvidia-drm.modeset=1 lsm=landlock,lockdown,yama,integrity,tomoyo,apparmor,bpf console=tty0 console=ttyS0,115200n8

label adv_live_encrypted_persist
        menu label ^2. Live (encrypted persistence - LUKS)
        kernel /live/vmlinuz
        append initrd=/live/initrd.img boot=live quiet loglevel=3 config persistence persistence-encryption=luks security=apparmor username=alfred nvidia-drm.modeset=1 lsm=landlock,lockdown,yama,integrity,tomoyo,apparmor,bpf console=tty0 console=ttyS0,115200n8

label adv_live_hebrew
        menu label ^3. Live (Hebrew / RTL locale)
        kernel /live/vmlinuz
        append initrd=/live/initrd.img boot=live quiet loglevel=3 config locales=he_IL.UTF-8 keyboard-layouts=il security=apparmor username=alfred nvidia-drm.modeset=1 lsm=landlock,lockdown,yama,integrity,tomoyo,apparmor,bpf console=tty0 console=ttyS0,115200n8

