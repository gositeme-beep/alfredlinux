<!DOCTYPE html>
<html>
<head>
    <title>VR Hub Boot Test</title>
    <style>
        body { font-family: monospace; background: #000; color: #0f0; padding: 20px; }
        #log { border: 1px solid #0f0; padding: 10px; height: 400px; overflow-y: auto; margin-bottom: 20px; }
        .entry { margin: 2px 0; }
        .error { color: #f00; }
        button { padding: 10px 20px; background: #0f0; color: #000; border: none; cursor: pointer; }
    </style>
</head>
<body>
<h1>VR Hub Boot Testing</h1>

<div id="log"></div>

<button onclick="location.reload()">Clear & Reload</button>
<button onclick="document.getElementById('log').innerHTML = ''">Clear Log</button>

<script>
// Intercept console
const origLog = console.log;
const origError = console.error;
const logDiv = document.getElementById('log');

function addLog(msg, isError = false) {
    const entry = document.createElement('div');
    entry.className = 'entry' + (isError ? ' error' : '');
    entry.textContent = msg;
    logDiv.appendChild(entry);
    logDiv.scrollTop = logDiv.scrollHeight;
}

console.log = function(...args) {
    origLog.apply(console, args);
    addLog('[LOG] ' + args.join(' '));
};

console.error = function(...args) {
    origError.apply(console, args);
    addLog('[ERROR] ' + args.join(' '), true);
};

addLog('[TEST] Page loaded at ' + new Date().toLocaleTimeString());

// Check globals
setTimeout(() => {
    addLog('[CHECK] window.THREE = ' + (typeof THREE !== 'undefined' ? 'DEFINED' : 'MISSING'));
    addLog('[CHECK] GoSiteMeQuality = ' + (typeof GoSiteMeQuality !== 'undefined' ? 'DEFINED' : 'MISSING'));
    addLog('[CHECK] initWorld = ' + (typeof initWorld !== 'undefined' ? 'DEFINED' : 'MISSING'));
    addLog('[CHECK] animate = ' + (typeof animate !== 'undefined' ? 'DEFINED' : 'MISSING'));
}, 100);

// Wait for page-specific scripts to load
window.addEventListener('load', () => {
    addLog('[BOOT] Window load event fired');
    
    try {
        addLog('[BOOT] Checking scene...');
        if (typeof scene === 'undefined') {
            addLog('❌ scene not defined - initWorld may not have run', true);
        } else {
            addLog('✓ scene is defined');
        }
        
        addLog('[BOOT] Checking camera...');
        if (typeof camera === 'undefined') {
            addLog('❌ camera not defined', true);
        } else {
            addLog('✓ camera is defined');
        }
        
        addLog('[BOOT] Checking renderer...');
        if (typeof renderer === 'undefined') {
            addLog('❌ renderer not defined', true);
        } else {
            addLog('✓ renderer is defined');
        }
        
    } catch(e) {
        addLog('[ERROR] Exception during boot check: ' + e.message, true);
    }
});

window.addEventListener('error', (e) => {
    addLog('[GLOBAL ERROR] ' + e.message + ' at ' + e.filename + ':' + e.lineno, true);
});

window.addEventListener('unhandledrejection', (e) => {
    addLog('[UNHANDLED REJECTION] ' + e.reason, true);
});
</script>

<!-- Load VR Hub scripts -->
<script src="/assets/js/vendor/three.r128.min.js"></script>
<script src="/vr/shared/gositeme-quality.js"></script>
<script>
addLog('[AFTER THREE.js] THREE = ' + (typeof THREE !== 'undefined' ? 'OK' : 'FAIL'));
addLog('[AFTER Quality] GoSiteMeQuality = ' + (typeof GoSiteMeQuality !== 'undefined' ? 'OK' : 'FAIL'));
</script>

<!-- Load main hub script (inline from hub) -->
<script>
// Minimal VR Hub excerpt to test
addLog('[TEST SETUP] Starting VR Hub variable initialization');

let scene, camera, renderer, clock;
let playerPos = { x: 0, y: 1.6, z: 0 };
const API = '/pay/api/vr-world.php';

function testInitWorld() {
    addLog('[testInitWorld] Creating scene...');
    scene = new THREE.Scene();
    addLog('[testInitWorld] Scene created');
    
    camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 200);
    addLog('[testInitWorld] Camera created');
    
    renderer = new THREE.WebGLRenderer({ antialias: true });
    addLog('[testInitWorld] Renderer created');
    
    clock = new THREE.Clock();
    addLog('[testInitWorld] Clock created');
    
    return true;
}

function testAnimate() {
    addLog('[testAnimate] Animation function called');
    const dt = clock.getDelta();
    addLog('[testAnimate] Delta time: ' + dt.toFixed(3) + 's');
    return true;
}

// Trigger test on load
setTimeout(() => {
    addLog('[TEST] Running manual initialization test...');
    try {
        if (testInitWorld()) {
            addLog('✓ testInitWorld completed');
        }
        if (testAnimate()) {
            addLog('✓ testAnimate completed');
        }
    } catch(e) {
        addLog('[TEST ERROR] ' + e.message, true);
        addLog(e.stack, true);
    }
}, 500);
</script>

</body>
</html>
