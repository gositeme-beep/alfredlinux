.progress-fill{height:100%;border-radius:4px;transition:width .5s;background:linear-gradient(90deg,#22c55e,#a855f7)}
.category{margin-bottom:1.5rem}
.cat-header{display:flex;align-items:center;gap:.6rem;cursor:pointer;padding:.6rem .8rem;border-radius:10px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04);margin-bottom:.4rem;transition:.2s}

.cat-header .cat-icon{font-size:1.2rem}
.cat-header .cat-name{font-size:.9rem;font-weight:700;flex:1}
.cat-header .cat-count{font-size:.7rem;color:rgba(255,255,255,.3)}

.cat-header .cat-status.running{background:rgba(59,130,246,.15);color:#3b82f6}
.cat-header .cat-status.done{background:rgba(34,197,94,.15);color:#22c55e}
.cat-header .cat-status.waiting{background:rgba(255,255,255,.05);color:rgba(255,255,255,.2)}
.test-list{padding-left:1rem;display:none}

.test{display:flex;align-items:center;gap:.5rem;padding:.3rem .5rem;font-size:.78rem;border-radius:6px;transition:.15s}
.test:hover{background:rgba(255,255,255,.02)}
.test .icon{width:18px;text-align:center;flex-shrink:0}
.test .name{flex:1;color:rgba(255,255,255,.6)}
.test .time{color:rgba(255,255,255,.2);font-size:.65rem;min-width:40px;text-align:right}
.test.pass .icon{color:#22c55e}
.test.fail .icon{color:#ef4444}
.test.skip .icon{color:#f97316}
.test.running .icon{color:#3b82f6;animation:spin 1s linear infinite}
.test.waiting .icon{color:rgba(255,255,255,.15)}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.controls{display:flex;gap:.5rem;margin-bottom:1.5rem;flex-wrap:wrap}
.ctrl-btn{padding:.5rem 1rem;border-radius:10px;border:none;cursor:pointer;font-size:.8rem;font-weight:700;color:#fff;transition:.2s}
.ctrl-btn.run{background:linear-gradient(135deg,#22c55e,#16a34a)}
.ctrl-btn.run:hover{transform:translateY(-2px)}
.ctrl-btn.api{background:linear-gradient(135deg,#a855f7,#8b5cf6)}
.ctrl-btn.reset{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1)}

var results = {};
var running = false;
var totalTests = 0;

function countTests() {
    totalTests = 0;
    TEST_CATEGORIES.forEach(function(cat) { totalTests += cat.tests.length; });
    return totalTests;
}

function log(msg, cls) {
    var el = document.getElementById('log');
    var time = new Date().toLocaleTimeString();
    el.innerHTML += '<div class="' + (cls||'') + '">[' + time + '] ' + msg + '</div>';
    el.scrollTop = el.scrollHeight;
}

function updateSummary() {
    var pass = 0, fail = 0, skip = 0;
    Object.keys(results).forEach(function(id) {
        if (results[id] === 'pass') pass++;
        else if (results[id] === 'fail') fail++;
        else if (results[id] === 'skip') skip++;
    });
    document.getElementById('passCount').textContent = pass;
    document.getElementById('failCount').textContent = fail;
    document.getElementById('skipCount').textContent = skip;
    var total = countTests();
    var done = pass + fail + skip;
    document.getElementById('progressFill').style.width = (done / total * 100) + '%';
    if (fail > 0) {
        document.getElementById('progressFill').style.background = 'linear-gradient(90deg,#22c55e,#ef4444)';
    }
}

function setTestStatus(testId, status, time) {
    results[testId] = status;
    var el = document.getElementById('test-' + testId);
    if (el) {
        el.className = 'test ' + status;
        el.querySelector('.icon').textContent = status === 'pass' ? '✓' : status === 'fail' ? '✗' : status === 'skip' ? '○' : status === 'running' ? '◌' : '·';
        if (time !== undefined) el.querySelector('.time').textContent = time + 'ms';
    }
    updateSummary();
}

function renderCategories() {
    var container = document.getElementById('categories');
    container.innerHTML = '';
    TEST_CATEGORIES.forEach(function(cat) {
        var div = document.createElement('div');
        div.className = 'category';
        div.id = 'cat-' + cat.id;

        var header = document.createElement('div');
        header.className = 'cat-header';
        header.innerHTML = '<span class="cat-icon">' + cat.icon + '</span>' +
            '<span class="cat-name">' + cat.name + '</span>' +
            '<span class="cat-count">' + cat.tests.length + ' tests</span>' +
            '<span class="cat-status waiting" id="cat-status-' + cat.id + '">waiting</span>';
        header.onclick = function() {
            var list = div.querySelector('.test-list');
            list.classList.toggle('open');
        };

        var list = document.createElement('div');
        list.className = 'test-list';
        cat.tests.forEach(function(test) {
            var t = document.createElement('div');
            t.className = 'test waiting';
            t.id = 'test-' + test.id;
            t.innerHTML = '<span class="icon">·</span><span class="name">' + test.name + '</span><span class="time">—</span>';
            list.appendChild(t);
        });

        div.appendChild(header);
        div.appendChild(list);
        container.appendChild(div);
    });
}

async function runCategory(catId) {
    if (running) return;
    running = true;
    var cat = TEST_CATEGORIES.find(function(c){return c.id === catId;});
    if (!cat) { running = false; return; }

    var statusEl = document.getElementById('cat-status-' + catId);
    statusEl.textContent = 'running';
    statusEl.className = 'cat-status running';

    // Open the test list
    var list = document.querySelector('#cat-' + catId + ' .test-list');
    list.classList.add('open');

    log('━━━ Running ' + cat.name + ' (' + cat.tests.length + ' tests) ━━━', 'info');

    for (var i = 0; i < cat.tests.length; i++) {
        await runTest(cat.tests[i]);
        await new Promise(function(r){setTimeout(r, 30);}); // Small delay for UI
    }

    statusEl.textContent = 'done';
    statusEl.className = 'cat-status done';
    log('━━━ ' + cat.name + ' complete ━━━', 'info');
    running = false;
}

async function runAllTests() {
    if (running) return;
    running = true;
    var startTime = performance.now();
    log('══════════════════════════════════════', 'info');
    log('🎛️ SoundStudioPro DJ World — Test Suite', 'info');
    log('Running ' + countTests() + ' tests across ' + TEST_CATEGORIES.length + ' categories...', 'info');
    log('══════════════════════════════════════', 'info');

    for (var c = 0; c < TEST_CATEGORIES.length; c++) {
        var cat = TEST_CATEGORIES[c];
        var statusEl = document.getElementById('cat-status-' + cat.id);
        statusEl.textContent = 'running';
        statusEl.className = 'cat-status running';

        log('', '');
        log('━━━ ' + cat.icon + ' ' + cat.name + ' (' + cat.tests.length + ' tests) ━━━', 'info');

        for (var t = 0; t < cat.tests.length; t++) {
            await runTest(cat.tests[t]);
            await new Promise(function(r){setTimeout(r, 15);});
        }

        statusEl.textContent = 'done';
        statusEl.className = 'cat-status done';
    }

    var totalTime = Math.round(performance.now() - startTime);
    var pass = 0, fail = 0;
    Object.keys(results).forEach(function(id) {
        if (results[id] === 'pass') pass++;
        else if (results[id] === 'fail') fail++;
    });

    log('', '');
    log('══════════════════════════════════════', 'info');
    log('✅ ' + pass + ' passed, ❌ ' + fail + ' failed — Total: ' + totalTime + 'ms', pass === countTests() ? 'pass' : 'warn');
    log('══════════════════════════════════════', 'info');
    running = false;
}

    document.getElementById('progressFill').style.width = '0%';
    document.getElementById('progressFill').style.background = 'linear-gradient(90deg,#22c55e,#a855f7)';
}
