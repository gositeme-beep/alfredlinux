<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ZPE Circuit Lab — Metaverse</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;font-family:'Segoe UI',system-ui,sans-serif;overflow:hidden;height:100vh}
#loading{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000;transition:opacity .5s}
#loading.hidden{opacity:0;pointer-events:none}
#loading h1{font-size:1.5em;background:linear-gradient(90deg,#00d4aa,#9945ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#loading p{color:#555;margin-top:8px;font-size:.85em}
.progress{width:200px;height:4px;background:#1e1e3a;border-radius:2px;margin-top:16px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#9945ff,#00d4aa);width:0%;transition:width .3s}
canvas{display:block}

/* HUD */
.hud{position:fixed;z-index:50;pointer-events:none}
.hud-top{top:12px;left:12px;right:12px;display:flex;justify-content:space-between;align-items:flex-start}
.hud-title{font-size:.9em;color:#00d4aa;text-shadow:0 0 10px rgba(0,212,170,.4)}
.hud-back{pointer-events:auto;color:#9945ff;text-decoration:none;font-size:.85em;background:#00000088;padding:4px 12px;border-radius:6px;border:1px solid #9945ff44}
.hud-stats{position:fixed;bottom:12px;left:12px;font-size:.72em;color:#555;z-index:50}

/* Circuit Info Panel */
.info-panel{position:fixed;right:12px;top:60px;width:280px;background:rgba(10,10,15,.92);border:1px solid #2a1a4a;border-radius:12px;padding:16px;z-index:60;pointer-events:auto;display:none;max-height:70vh;overflow-y:auto}
.info-panel.show{display:block}
.info-panel h3{font-size:.85em;color:#9945ff;margin-bottom:8px}
.info-panel .desc{font-size:.72em;color:#888;line-height:1.5;margin-bottom:10px}
.info-panel .formula{font-size:.75em;color:#00d4aa;font-style:italic;padding:8px;background:#00d4aa11;border-radius:6px;margin-bottom:10px}
.info-panel .comp-list{font-size:.7em;color:#666}
.info-panel .comp-list span{display:block;padding:2px 0}
.info-panel .theory{font-size:.7em;color:#555;line-height:1.5;margin-top:10px;border-top:1px solid #1e1e3a;padding-top:10px}

/* Circuit Selector */
.circuit-select{position:fixed;left:12px;bottom:50px;z-index:60;display:flex;flex-direction:column;gap:6px}
.circuit-btn{pointer-events:auto;padding:8px 14px;background:rgba(10,10,15,.85);border:1px solid #2a2a4a;color:#ccc;border-radius:8px;cursor:pointer;font-size:.75em;transition:.2s;text-align:left}
.circuit-btn:hover,.circuit-btn.active{border-color:#9945ff;background:rgba(153,69,255,.15);color:#fff}
.circuit-btn .researcher{font-size:.65em;color:#9945ff;display:block;margin-top:2px}

/* Simulation Controls */
.sim-controls{position:fixed;bottom:12px;right:12px;z-index:60;display:flex;gap:8px}
.sim-btn{pointer-events:auto;padding:8px 16px;background:linear-gradient(135deg,#9945ff,#00d4aa);color:#fff;font-size:.78em;font-weight:600;border:none;border-radius:8px;cursor:pointer;transition:.2s}
.sim-btn:hover{transform:scale(1.05)}
.sim-btn.secondary{background:#1e1e3a;border:1px solid #2a2a4a;color:#00d4aa}
</style>
</head>
<body>

<!-- Loading -->
<div id="loading">
    <h1>⚡ ZPE Circuit Lab</h1>
    <p>Initializing 3D circuit visualization...</p>
    <div class="progress"><div class="progress-fill" id="load-progress"></div></div>
</div>

<!-- HUD -->
<div class="hud hud-top">
    <span class="hud-title">⚡ ZPE Circuit Lab — Research Visualization</span>
    <a href="/vr/hub/" class="hud-back">← Hub</a>
</div>
<div class="hud-stats" id="hud-stats">Components: 0 | Energy Flow: Idle</div>

<!-- Info Panel -->
<div class="info-panel" id="info-panel">
    <h3 id="info-title">Select a Circuit</h3>
    <div class="desc" id="info-desc">Choose a ZPE circuit to visualize in 3D</div>
    <div class="formula" id="info-formula" style="display:none"></div>
    <div class="comp-list" id="info-components"></div>
    <div class="theory" id="info-theory"></div>
</div>

<!-- Circuit Selector -->
<div class="circuit-select">
    <button class="circuit-btn active" onclick="loadCircuit(0)">
        Don Smith Resonant Tank
        <span class="researcher">Don Smith • Resonant</span>
    </button>
    <button class="circuit-btn" onclick="loadCircuit(1)">
        Tesla Radiant Collector
        <span class="researcher">Nikola Tesla • Radiant</span>
    </button>
    <button class="circuit-btn" onclick="loadCircuit(2)">
        Hutchison Crystal Battery
        <span class="researcher">John Hutchison • Crystal</span>
    </button>
    <button class="circuit-btn" onclick="loadCircuit(3)">
        Searl Effect Generator
        <span class="researcher">Prof. John Searl • Magnetic</span>
    </button>
</div>

<!-- Controls -->
<div class="sim-controls">
    <button class="sim-btn secondary" onclick="toggleRotation()">⟳ Rotate</button>
    <button class="sim-btn" onclick="toggleSimulation()">▶ Simulate</button>
    <button class="sim-btn secondary" onclick="toggleBuilder()">🔧 Build</button>
    <button class="sim-btn secondary" onclick="exportCircuit()">💾 Export</button>
    <button class="sim-btn" style="background:linear-gradient(135deg,#ff6b00,#ff3040)" onclick="submitForPrint()">🖨️ Submit for Print</button>
</div>

<!-- Component Palette (Builder Mode) -->
<div id="builderPanel" style="display:none;position:fixed;left:12px;top:60px;width:220px;background:rgba(10,10,15,.94);border:1px solid #2a1a4a;border-radius:12px;padding:12px;z-index:70;max-height:70vh;overflow-y:auto;font-family:system-ui,sans-serif">
    <h4 style="color:#9945ff;font-size:.8em;margin-bottom:8px;letter-spacing:2px">ADD COMPONENT</h4>
    <div id="componentPalette" style="display:flex;flex-direction:column;gap:4px"></div>
    <hr style="border-color:#1e1e3a;margin:8px 0">
    <h4 style="color:#00d4aa;font-size:.75em;margin-bottom:6px">CUSTOM CIRCUIT</h4>
    <input id="customCircuitName" placeholder="Circuit name..." style="width:100%;padding:6px 8px;background:#0a0a15;border:1px solid #2a2a4a;border-radius:6px;color:#ccc;font-size:.75em;margin-bottom:4px">
    <textarea id="customCircuitDesc" placeholder="Description..." rows="2" style="width:100%;padding:6px 8px;background:#0a0a15;border:1px solid #2a2a4a;border-radius:6px;color:#ccc;font-size:.7em;resize:none;margin-bottom:4px"></textarea>
    <button onclick="saveCustomCircuit()" style="width:100%;padding:6px;background:linear-gradient(135deg,#00d4aa,#9945ff);border:none;border-radius:6px;color:#fff;font-size:.75em;font-weight:600;cursor:pointer">Save as New Circuit</button>
    <div id="customCircuitsList" style="margin-top:8px"></div>
</div>

<!-- Print Modal -->
<div id="printModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;display:none;align-items:center;justify-content:center;backdrop-filter:blur(6px)">
    <div style="background:#0f0f1a;border:1px solid #9945ff44;border-radius:16px;padding:24px;max-width:480px;width:90%;font-family:system-ui,sans-serif">
        <h3 style="color:#9945ff;margin-bottom:12px">🖨️ Submit Circuit for PCB Print</h3>
        <div id="printCircuitInfo" style="color:#aaa;font-size:.8em;margin-bottom:12px"></div>
        <label style="color:#888;font-size:.75em;display:block;margin-bottom:4px">Board Size</label>
        <select id="printBoardSize" style="width:100%;padding:8px;background:#1a1a2a;border:1px solid #2a2a4a;border-radius:6px;color:#ccc;margin-bottom:8px;font-size:.8em">
            <option value="50x50">50mm × 50mm (Small)</option>
            <option value="100x100" selected>100mm × 100mm (Standard)</option>
            <option value="150x100">150mm × 100mm (Medium)</option>
            <option value="200x200">200mm × 200mm (Large)</option>
        </select>
        <label style="color:#888;font-size:.75em;display:block;margin-bottom:4px">Layers</label>
        <select id="printLayers" style="width:100%;padding:8px;background:#1a1a2a;border:1px solid #2a2a4a;border-radius:6px;color:#ccc;margin-bottom:8px;font-size:.8em">
            <option value="2" selected>2-Layer (Standard)</option>
            <option value="4">4-Layer (Complex)</option>
            <option value="6">6-Layer (High-Density)</option>
        </select>
        <label style="color:#888;font-size:.75em;display:block;margin-bottom:4px">Quantity</label>
        <input type="number" id="printQty" value="5" min="1" max="100" style="width:100%;padding:8px;background:#1a1a2a;border:1px solid #2a2a4a;border-radius:6px;color:#ccc;margin-bottom:8px;font-size:.8em">
        <label style="color:#888;font-size:.75em;display:block;margin-bottom:4px">Notes / Special Requirements</label>
        <textarea id="printNotes" rows="3" placeholder="e.g. Lead-free solder, specific trace widths..." style="width:100%;padding:8px;background:#1a1a2a;border:1px solid #2a2a4a;border-radius:6px;color:#ccc;margin-bottom:12px;font-size:.8em;resize:none"></textarea>
        <div style="display:flex;gap:8px">
            <button onclick="closePrintModal()" style="flex:1;padding:10px;background:#1a1a2a;border:1px solid #2a2a4a;border-radius:8px;color:#888;cursor:pointer;font-size:.8em">Cancel</button>
            <button onclick="confirmPrintSubmit()" style="flex:1;padding:10px;background:linear-gradient(135deg,#ff6b00,#ff3040);border:none;border-radius:8px;color:#fff;font-weight:600;cursor:pointer;font-size:.8em">Submit Order →</button>
        </div>
    </div>
</div>

<script src="/assets/js/vendor/three.r128.min.js"></script>
<script src="/vr/shared/gositeme-quality.js"></script>
<script>
// ─── Scene Setup ─────────────────────────────────────────────────
let scene, camera, renderer, animationId;
let circuitGroup = null;
let isSimulating = false;
let isRotating = true;
let time = 0;
let energyParticles = [];
let currentCircuit = 0;

const circuits = [
    {
        title: 'Don Smith Resonant Tank Circuit',
        researcher: 'Don Smith',
        formula: 'f = 1/(2π√(LC))',
        description: 'L-C resonant tank circuit tuned to ambient frequency for zero-point energy extraction. The spark gap generates a broad-spectrum pulse that excites the resonant tank at its natural frequency.',
        theory: 'The circuit operates by exciting a tuned LC tank at its resonant frequency using high-voltage spark gap pulses. At resonance, the impedance of the tank reaches maximum, allowing energy to be captured from ambient electromagnetic fields. The step-up transformer increases voltage to the kilovolt range needed for spark gap ionization.',
        components: [
            {type:'battery', label:'12V DC', x:0, z:-3, color:0xff4444},
            {type:'spark_gap', label:'Spark Gap', x:0, z:-1.5, color:0xf0b429},
            {type:'transformer', label:'Step-Up 1:100', x:0, z:0, color:0x9945ff},
            {type:'capacitor', label:'0.1µF', x:-1.5, z:1.5, color:0x00d4aa},
            {type:'inductor', label:'10mH', x:1.5, z:1.5, color:0x4dabf7},
            {type:'diode', label:'Rectifier', x:0, z:3, color:0x69db7c},
            {type:'capacitor', label:'1mF Filter', x:-1.5, z:4, color:0x00d4aa},
            {type:'resistor', label:'Load 100Ω', x:1.5, z:4, color:0xffa500},
            {type:'voltmeter', label:'Output', x:0, z:5, color:0x4dabf7},
        ]
    },
    {
        title: 'Tesla Radiant Energy Collector',
        researcher: 'Nikola Tesla',
        formula: 'V = E × h',
        description: 'Based on Tesla patent US685957. An elevated antenna captures ambient electromagnetic radiation. An LC circuit tunes to the optimal resonant frequency for maximum energy harvesting.',
        theory: 'Tesla demonstrated that cosmic rays and ambient EM radiation carry significant energy. An elevated conductive plate captures this energy, which is tuned via an LC circuit and rectified via a voltage doubler into stored DC power. The key is the antenna height and resonant tuning.',
        components: [
            {type:'antenna', label:'Antenna 2m', x:0, z:-3, color:0xff6b6b},
            {type:'inductor', label:'100mH', x:-1, z:-1, color:0x4dabf7},
            {type:'capacitor', label:'10µF', x:1, z:-1, color:0x00d4aa},
            {type:'diode', label:'D1 Schottky', x:-1, z:1, color:0x69db7c},
            {type:'diode', label:'D2 Schottky', x:1, z:1, color:0x69db7c},
            {type:'capacitor', label:'10mF Store', x:0, z:2.5, color:0x00d4aa},
            {type:'voltmeter', label:'Output', x:0, z:4, color:0x4dabf7},
        ]
    },
    {
        title: 'Hutchison Crystal Energy Cell',
        researcher: 'John Hutchison',
        formula: 'V_total = n × V_layer',
        description: 'Layered dissimilar metal crystal battery producing sustained electrical potential without chemical reaction. Multiple cells in series increase total voltage output.',
        theory: 'The Hutchison crystal cell uses layers of dissimilar metals with crystalline structures. The mechanism is theorized to tap into lattice energy or quantum vacuum fluctuations. Unlike chemical batteries, these cells show minimal degradation over time, suggesting a non-chemical energy source.',
        components: [
            {type:'crystal', label:'Cell A (5 layers)', x:-2, z:0, color:0xf0b429},
            {type:'crystal', label:'Cell B (5 layers)', x:0, z:0, color:0xf0b429},
            {type:'crystal', label:'Cell C (5 layers)', x:2, z:0, color:0xf0b429},
            {type:'capacitor', label:'Buffer 100mF', x:0, z:2, color:0x00d4aa},
            {type:'resistor', label:'Load 1kΩ', x:1.5, z:3, color:0xffa500},
            {type:'voltmeter', label:'Voltage', x:-1.5, z:3, color:0x4dabf7},
            {type:'ammeter', label:'Current', x:0, z:4, color:0x4dabf7},
        ]
    },
    {
        title: 'Searl Effect Generator (Mini)',
        researcher: 'Professor John Searl',
        formula: 'Law of Squares: n² pattern imprinting',
        description: 'Miniature SEG with 3 concentric magnetic rings and 12 rollers per ring. Demonstrates the Searl Effect for electrical generation and potentially inverse-gravity.',
        theory: 'The SEG uses neodymium magnetic elements imprinted with the Law of Squares — a mathematical pattern that creates specific magnetic gradients. When rollers begin orbital motion around the stator rings, they generate both electrical current (via pickup coils) and a theorized gravitational reduction field (inverse-G). This is the most promising candidate for propulsion applications.',
        components: [
            {type:'seg_ring', label:'Ring 1 (Inner)', x:0, z:0, color:0x9945ff, radius:1},
            {type:'seg_ring', label:'Ring 2 (Middle)', x:0, z:0, color:0x7c3aed, radius:2},
            {type:'seg_ring', label:'Ring 3 (Outer)', x:0, z:0, color:0x6d28d9, radius:3},
            {type:'coil', label:'Pickup Coil A', x:-3, z:2, color:0x00d4aa},
            {type:'coil', label:'Pickup Coil B', x:3, z:2, color:0x00d4aa},
            {type:'capacitor', label:'Smoothing', x:0, z:3.5, color:0x00d4aa},
            {type:'diode', label:'Bridge Rect', x:-1.5, z:3.5, color:0x69db7c},
            {type:'diode', label:'Bridge Rect', x:1.5, z:3.5, color:0x69db7c},
            {type:'voltmeter', label:'Output', x:0, z:5, color:0x4dabf7},
        ]
    }
];

function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050510);
    scene.fog = new THREE.FogExp2(0x050510, 0.04);

    camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 200);
    camera.position.set(0, 8, 10);
    camera.lookAt(0, 0, 0);

    renderer = new THREE.WebGLRenderer({antialias: true});
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(typeof GoSiteMeQuality!=='undefined'?GoSiteMeQuality.dpr:Math.min(window.devicePixelRatio,2));
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    document.body.appendChild(renderer.domElement);

    // Lights
    const ambient = new THREE.AmbientLight(0x222244, 0.5);
    scene.add(ambient);
    const point1 = new THREE.PointLight(0x9945ff, 1, 30);
    point1.position.set(5, 8, 5);
    scene.add(point1);
    const point2 = new THREE.PointLight(0x00d4aa, 0.8, 30);
    point2.position.set(-5, 8, -5);
    scene.add(point2);

    // Floor — lab grid
    const floorGeo = new THREE.PlaneGeometry(40, 40);
    const floorMat = new THREE.MeshStandardMaterial({color: 0x0a0a15, roughness: 0.9, metalness: 0.1});
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = -0.5;
    scene.add(floor);

    // Grid lines on floor
    const gridHelper = new THREE.GridHelper(20, 20, 0x1a1a3a, 0x0f0f20);
    gridHelper.position.y = -0.49;
    scene.add(gridHelper);

    // Lab walls (transparent)
    for (let i = 0; i < 4; i++) {
        const wallGeo = new THREE.PlaneGeometry(20, 6);
        const wallMat = new THREE.MeshStandardMaterial({color: 0x0a0a20, transparent: true, opacity: 0.3, side: THREE.DoubleSide});
        const wall = new THREE.Mesh(wallGeo, wallMat);
        wall.position.y = 2.5;
        if (i === 0) { wall.position.z = -10; }
        else if (i === 1) { wall.position.z = 10; wall.rotation.y = Math.PI; }
        else if (i === 2) { wall.position.x = -10; wall.rotation.y = Math.PI / 2; }
        else { wall.position.x = 10; wall.rotation.y = -Math.PI / 2; }
        scene.add(wall);
    }

    // Platform
    const platGeo = new THREE.CylinderGeometry(5, 5.5, 0.3, 32);
    const platMat = new THREE.MeshStandardMaterial({color: 0x12121a, roughness: 0.6, metalness: 0.4});
    const platform = new THREE.Mesh(platGeo, platMat);
    platform.position.y = -0.35;
    scene.add(platform);

    // Platform ring glow
    const ringGeo = new THREE.TorusGeometry(5, 0.05, 8, 64);
    const ringMat = new THREE.MeshBasicMaterial({color: 0x9945ff, transparent: true, opacity: 0.6});
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.rotation.x = -Math.PI / 2;
    ring.position.y = -0.19;
    scene.add(ring);

    loadCircuit(0);
    updateProgress(100);
    setTimeout(() => document.getElementById('loading').classList.add('hidden'), 800);

    animate();

    // Mouse orbit
    let isDragging = false, lastMouse = {x:0, y:0};
    let orbitAngle = {h: 0, v: 0.6};
    let orbitDist = 12;

    renderer.domElement.addEventListener('mousedown', e => { isDragging = true; lastMouse = {x: e.clientX, y: e.clientY}; });
    renderer.domElement.addEventListener('mousemove', e => {
        if (!isDragging || isRotating) return;
        const dx = e.clientX - lastMouse.x, dy = e.clientY - lastMouse.y;
        orbitAngle.h -= dx * 0.005;
        orbitAngle.v = Math.max(0.1, Math.min(1.4, orbitAngle.v + dy * 0.005));
        lastMouse = {x: e.clientX, y: e.clientY};
        updateCamera();
    });
    renderer.domElement.addEventListener('mouseup', () => isDragging = false);
    renderer.domElement.addEventListener('wheel', e => {
        orbitDist = Math.max(5, Math.min(25, orbitDist + e.deltaY * 0.01));
        updateCamera();
    });

    function updateCamera() {
        camera.position.x = Math.sin(orbitAngle.h) * Math.cos(orbitAngle.v) * orbitDist;
        camera.position.y = Math.sin(orbitAngle.v) * orbitDist;
        camera.position.z = Math.cos(orbitAngle.h) * Math.cos(orbitAngle.v) * orbitDist;
        camera.lookAt(0, 0, 0);
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
}

function updateProgress(pct) {
    document.getElementById('load-progress').style.width = pct + '%';
}

// ─── Component 3D Builders ──────────────────────────────────────
function createComponent3D(comp) {
    const group = new THREE.Group();
    const color = comp.color || 0x00d4aa;

    switch (comp.type) {
        case 'battery': {
            const body = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.25, 0.8, 16), new THREE.MeshStandardMaterial({color, roughness: 0.3, metalness: 0.7}));
            const cap = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.15, 0.1, 16), new THREE.MeshStandardMaterial({color: 0xcccccc, metalness: 0.9}));
            cap.position.y = 0.45;
            group.add(body, cap);
            break;
        }
        case 'capacitor': {
            const plate1 = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.5, 0.05), new THREE.MeshStandardMaterial({color, metalness: 0.6}));
            const plate2 = plate1.clone();
            plate1.position.z = -0.08; plate2.position.z = 0.08;
            group.add(plate1, plate2);
            break;
        }
        case 'resistor': {
            const body = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.15, 0.5, 8), new THREE.MeshStandardMaterial({color, roughness: 0.7}));
            body.rotation.z = Math.PI / 2;
            const lead1 = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.3, 6), new THREE.MeshStandardMaterial({color: 0xaaaaaa, metalness: 0.9}));
            const lead2 = lead1.clone();
            lead1.rotation.z = Math.PI / 2; lead1.position.x = -0.4;
            lead2.rotation.z = Math.PI / 2; lead2.position.x = 0.4;
            group.add(body, lead1, lead2);
            break;
        }
        case 'inductor':
        case 'coil': {
            const torusGeo = new THREE.TorusGeometry(0.2, 0.05, 8, 20);
            for (let i = 0; i < 5; i++) {
                const coilRing = new THREE.Mesh(torusGeo, new THREE.MeshStandardMaterial({color, metalness: 0.5}));
                coilRing.position.x = (i - 2) * 0.12;
                coilRing.rotation.y = Math.PI / 2;
                group.add(coilRing);
            }
            break;
        }
        case 'transformer': {
            const core = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.6, 0.4), new THREE.MeshStandardMaterial({color: 0x333344, roughness: 0.8}));
            const coil1Geo = new THREE.TorusGeometry(0.2, 0.04, 8, 16);
            const coil1 = new THREE.Mesh(coil1Geo, new THREE.MeshStandardMaterial({color: 0xff6b6b, metalness: 0.5}));
            const coil2 = new THREE.Mesh(coil1Geo, new THREE.MeshStandardMaterial({color, metalness: 0.5}));
            coil1.position.x = -0.15; coil2.position.x = 0.15;
            group.add(core, coil1, coil2);
            break;
        }
        case 'diode': {
            const body = new THREE.Mesh(new THREE.ConeGeometry(0.15, 0.4, 8), new THREE.MeshStandardMaterial({color, metalness: 0.5}));
            body.rotation.z = Math.PI / 2;
            const bar = new THREE.Mesh(new THREE.BoxGeometry(0.02, 0.3, 0.3), new THREE.MeshStandardMaterial({color: 0xcccccc, metalness: 0.9}));
            bar.position.x = 0.2;
            group.add(body, bar);
            break;
        }
        case 'spark_gap': {
            const rod1 = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 0.4, 8), new THREE.MeshStandardMaterial({color: 0xcccccc, metalness: 0.9}));
            const rod2 = rod1.clone();
            rod1.position.x = -0.12; rod2.position.x = 0.12;
            // Spark glow
            const spark = new THREE.Mesh(new THREE.SphereGeometry(0.08, 8, 8), new THREE.MeshBasicMaterial({color: 0xffff00, transparent: true, opacity: 0.6}));
            spark.userData.isSpark = true;
            group.add(rod1, rod2, spark);
            break;
        }
        case 'antenna': {
            const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 1.5, 8), new THREE.MeshStandardMaterial({color: 0xcccccc, metalness: 0.9}));
            pole.position.y = 0.75;
            const top = new THREE.Mesh(new THREE.SphereGeometry(0.08, 8, 8), new THREE.MeshBasicMaterial({color, transparent: true, opacity: 0.8}));
            top.position.y = 1.5;
            top.userData.isAntenna = true;
            group.add(pole, top);
            break;
        }
        case 'crystal': {
            const crystalGeo = new THREE.OctahedronGeometry(0.3, 0);
            const crystalMat = new THREE.MeshStandardMaterial({color, roughness: 0.1, metalness: 0.3, transparent: true, opacity: 0.8});
            const crystal = new THREE.Mesh(crystalGeo, crystalMat);
            crystal.userData.isCrystal = true;
            group.add(crystal);
            break;
        }
        case 'seg_ring': {
            const radius = comp.radius || 1;
            const ringGeo = new THREE.TorusGeometry(radius, 0.08, 8, 32);
            const ringMesh = new THREE.Mesh(ringGeo, new THREE.MeshStandardMaterial({color, roughness: 0.3, metalness: 0.7}));
            ringMesh.rotation.x = -Math.PI / 2;
            group.add(ringMesh);
            // Rollers
            for (let i = 0; i < 12; i++) {
                const angle = (i / 12) * Math.PI * 2;
                const roller = new THREE.Mesh(new THREE.SphereGeometry(0.1, 8, 8), new THREE.MeshStandardMaterial({color: 0x00d4aa, metalness: 0.8}));
                roller.position.x = Math.cos(angle) * radius;
                roller.position.z = Math.sin(angle) * radius;
                roller.userData.isRoller = true;
                roller.userData.angle = angle;
                roller.userData.radius = radius;
                group.add(roller);
            }
            break;
        }
        case 'voltmeter':
        case 'ammeter': {
            const meterBody = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.25, 0.15, 16), new THREE.MeshStandardMaterial({color: 0x222233, roughness: 0.4}));
            const face = new THREE.Mesh(new THREE.CircleGeometry(0.24, 16), new THREE.MeshBasicMaterial({color}));
            face.position.y = 0.08;
            face.rotation.x = -Math.PI / 2;
            group.add(meterBody, face);
            break;
        }
        default: {
            const box = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.3, 0.4), new THREE.MeshStandardMaterial({color, roughness: 0.5}));
            group.add(box);
        }
    }

    // Label
    group.position.set(comp.x || 0, 0, comp.z || 0);
    group.userData = {...comp};
    return group;
}

// ─── Wires Between Components ───────────────────────────────────
function createWires(comps) {
    const wireGroup = new THREE.Group();
    for (let i = 0; i < comps.length - 1; i++) {
        const a = comps[i], b = comps[i+1];
        if (a.type === 'seg_ring' || b.type === 'seg_ring') continue;
        const points = [
            new THREE.Vector3(a.x, 0.05, a.z),
            new THREE.Vector3(a.x, 0.05, (a.z + b.z) / 2),
            new THREE.Vector3(b.x, 0.05, (a.z + b.z) / 2),
            new THREE.Vector3(b.x, 0.05, b.z)
        ];
        const curve = new THREE.CatmullRomCurve3(points);
        const wireGeo = new THREE.TubeGeometry(curve, 20, 0.015, 6, false);
        const wireMat = new THREE.MeshBasicMaterial({color: 0x00d4aa, transparent: true, opacity: 0.4});
        wireGroup.add(new THREE.Mesh(wireGeo, wireMat));
    }
    return wireGroup;
}

// ─── Energy Particles ────────────────────────────────────────────
function createEnergyParticles(comps) {
    energyParticles = [];
    if (!isSimulating) return;

    for (let i = 0; i < 30; i++) {
        const geo = new THREE.SphereGeometry(0.03, 6, 6);
        const mat = new THREE.MeshBasicMaterial({color: Math.random() > 0.5 ? 0x00d4aa : 0x9945ff, transparent: true, opacity: 0.8});
        const particle = new THREE.Mesh(geo, mat);
        const compIdx = Math.floor(Math.random() * comps.length);
        const c = comps[compIdx];
        particle.position.set(c.x + (Math.random()-0.5)*0.5, Math.random()*0.5, c.z + (Math.random()-0.5)*0.5);
        particle.userData = {
            speed: 0.5 + Math.random() * 1.5,
            targetIdx: (compIdx + 1) % comps.length,
            progress: Math.random(),
            comps
        };
        scene.add(particle);
        energyParticles.push(particle);
    }
}

// ─── Load Circuit ────────────────────────────────────────────────
function loadCircuit(idx) {
    currentCircuit = idx;
    const circuit = circuits[idx];

    // Remove old
    if (circuitGroup) scene.remove(circuitGroup);
    energyParticles.forEach(p => scene.remove(p));
    energyParticles = [];

    circuitGroup = new THREE.Group();

    // Add components
    circuit.components.forEach(comp => {
        const comp3D = createComponent3D(comp);
        circuitGroup.add(comp3D);
    });

    // Add wires
    const wireGroup = createWires(circuit.components);
    circuitGroup.add(wireGroup);

    scene.add(circuitGroup);

    // Update UI
    document.querySelectorAll('.circuit-btn').forEach((b, i) => b.classList.toggle('active', i === idx));
    document.getElementById('info-title').textContent = circuit.title;
    document.getElementById('info-desc').textContent = circuit.description;
    document.getElementById('info-formula').textContent = circuit.formula;
    document.getElementById('info-formula').style.display = 'block';
    document.getElementById('info-components').innerHTML = circuit.components.map(c => `<span>• ${c.label} (${c.type})</span>`).join('');
    document.getElementById('info-theory').textContent = circuit.theory;
    document.getElementById('info-panel').classList.add('show');

    document.getElementById('hud-stats').textContent = `Components: ${circuit.components.length} | Energy Flow: ${isSimulating ? 'Active' : 'Idle'}`;

    if (isSimulating) createEnergyParticles(circuit.components);
}

// ─── Animation ───────────────────────────────────────────────────
function animate() {
    animationId = requestAnimationFrame(animate);
    time += 0.016;

    // Auto-rotate
    if (isRotating && circuitGroup) {
        camera.position.x = Math.sin(time * 0.2) * 12;
        camera.position.z = Math.cos(time * 0.2) * 12;
        camera.position.y = 6 + Math.sin(time * 0.1) * 2;
        camera.lookAt(0, 0, 0);
    }

    // Animate components
    if (circuitGroup && isSimulating) {
        circuitGroup.traverse(child => {
            if (child.userData.isSpark) {
                child.scale.setScalar(0.5 + Math.abs(Math.sin(time * 15)) * 1.5);
                child.material.opacity = 0.3 + Math.abs(Math.sin(time * 15)) * 0.7;
            }
            if (child.userData.isAntenna) {
                child.scale.setScalar(0.8 + Math.sin(time * 3) * 0.4);
                child.material.opacity = 0.5 + Math.sin(time * 3) * 0.3;
            }
            if (child.userData.isCrystal) {
                child.rotation.y += 0.02;
                child.material.opacity = 0.6 + Math.sin(time * 2) * 0.2;
            }
            if (child.userData.isRoller) {
                const a = child.userData.angle + time * 2;
                const r = child.userData.radius;
                child.position.x = Math.cos(a) * r;
                child.position.z = Math.sin(a) * r;
            }
        });
    }

    // Animate energy particles
    energyParticles.forEach(p => {
        const comps = p.userData.comps;
        const from = comps[p.userData.targetIdx];
        const to = comps[(p.userData.targetIdx + 1) % comps.length];
        p.userData.progress += p.userData.speed * 0.01;
        if (p.userData.progress >= 1) {
            p.userData.progress = 0;
            p.userData.targetIdx = (p.userData.targetIdx + 1) % comps.length;
        }
        const t = p.userData.progress;
        p.position.x = from.x + (to.x - from.x) * t;
        p.position.y = 0.1 + Math.sin(t * Math.PI) * 0.3;
        p.position.z = from.z + (to.z - from.z) * t;
    });

    renderer.render(scene, camera);
}

// ─── Controls ────────────────────────────────────────────────────
function toggleSimulation() {
    isSimulating = !isSimulating;
    const btn = document.querySelector('.sim-btn:not(.secondary)');
    btn.textContent = isSimulating ? '⏸ Pause' : '▶ Simulate';
    if (isSimulating) {
        createEnergyParticles(circuits[currentCircuit].components);
    } else {
        energyParticles.forEach(p => scene.remove(p));
        energyParticles = [];
    }
    document.getElementById('hud-stats').textContent = `Components: ${circuits[currentCircuit].components.length} | Energy Flow: ${isSimulating ? 'Active' : 'Idle'}`;
}

function toggleRotation() {
    isRotating = !isRotating;
    document.querySelector('.sim-btn.secondary').textContent = isRotating ? '⟳ Rotating' : '⟳ Manual';
}

// ─── Init ────────────────────────────────────────────────────────
init();
initBuilder();

// ─── Builder System ──────────────────────────────────────────────
let builderMode = false;
let customCircuits = [];

// Load saved custom circuits from localStorage
try {
    const saved = localStorage.getItem('circuit-lab-custom');
    if (saved) customCircuits = JSON.parse(saved);
} catch(e) {}

const COMPONENT_TYPES = [
    {type:'battery', label:'Battery', icon:'🔋', color:0xff4444},
    {type:'resistor', label:'Resistor', icon:'⚡', color:0xffa500},
    {type:'capacitor', label:'Capacitor', icon:'⊞', color:0x00d4aa},
    {type:'inductor', label:'Inductor / Coil', icon:'◎', color:0x4dabf7},
    {type:'diode', label:'Diode', icon:'▶', color:0x69db7c},
    {type:'transformer', label:'Transformer', icon:'⧫', color:0x9945ff},
    {type:'spark_gap', label:'Spark Gap', icon:'⚡', color:0xf0b429},
    {type:'antenna', label:'Antenna', icon:'📡', color:0xff6b6b},
    {type:'crystal', label:'Crystal Cell', icon:'💎', color:0xf0b429},
    {type:'coil', label:'Pickup Coil', icon:'🌀', color:0x00d4aa},
    {type:'seg_ring', label:'SEG Ring', icon:'⭕', color:0x9945ff},
    {type:'voltmeter', label:'Voltmeter', icon:'📊', color:0x4dabf7},
    {type:'ammeter', label:'Ammeter', icon:'📏', color:0x4dabf7},
];

function initBuilder() {
    const palette = document.getElementById('componentPalette');
    if (!palette) return;
    COMPONENT_TYPES.forEach(ct => {
        const btn = document.createElement('button');
        btn.style.cssText = 'display:flex;align-items:center;gap:6px;padding:6px 8px;background:#12121a;border:1px solid #2a2a4a;border-radius:6px;color:#ccc;cursor:pointer;font-size:.72em;text-align:left;transition:.2s';
        btn.innerHTML = ct.icon + ' ' + ct.label;
        btn.onmouseenter = () => btn.style.borderColor = '#9945ff';
        btn.onmouseleave = () => btn.style.borderColor = '#2a2a4a';
        btn.onclick = () => addComponentToCircuit(ct);
        palette.appendChild(btn);
    });
    renderCustomCircuitsList();
}

function toggleBuilder() {
    builderMode = !builderMode;
    document.getElementById('builderPanel').style.display = builderMode ? 'block' : 'none';
    const btn = document.querySelector('.sim-controls button:nth-child(3)');
    if (btn) btn.textContent = builderMode ? '🔧 Close Builder' : '🔧 Build';
}

function addComponentToCircuit(ct) {
    const circuit = circuits[currentCircuit];
    // Find empty position for new component
    const existing = circuit.components.length;
    const angle = (existing * 0.8);
    const radius = 2 + existing * 0.5;
    const newComp = {
        type: ct.type,
        label: ct.label + ' ' + (existing + 1),
        x: Math.cos(angle) * radius,
        z: Math.sin(angle) * radius,
        color: ct.color
    };
    if (ct.type === 'seg_ring') newComp.radius = 1 + Math.random() * 2;
    circuit.components.push(newComp);
    loadCircuit(currentCircuit);
    showStatus('Added ' + ct.label);
}

function showStatus(msg) {
    const el = document.getElementById('hud-stats');
    el.textContent = msg;
    setTimeout(() => {
        el.textContent = 'Components: ' + circuits[currentCircuit].components.length + ' | Energy Flow: ' + (isSimulating ? 'Active' : 'Idle');
    }, 2000);
}

// ─── Export Circuit ──────────────────────────────────────────────
function exportCircuit() {
    const circuit = circuits[currentCircuit];
    const exportData = {
        name: circuit.title,
        researcher: circuit.researcher || 'Custom',
        formula: circuit.formula || '',
        description: circuit.description || '',
        theory: circuit.theory || '',
        components: circuit.components.map(c => ({
            type: c.type,
            label: c.label,
            x: Math.round(c.x * 100) / 100,
            z: Math.round(c.z * 100) / 100,
            color: '#' + (c.color || 0x00d4aa).toString(16).padStart(6, '0')
        })),
        exportedAt: new Date().toISOString(),
        format: 'GoSiteMe Circuit Lab v1.0'
    };

    // Generate schematic text
    let schematic = '═══════════════════════════════════════════\n';
    schematic += '  ' + circuit.title + '\n';
    schematic += '  Researcher: ' + (circuit.researcher || 'Custom') + '\n';
    schematic += '  Formula: ' + (circuit.formula || 'N/A') + '\n';
    schematic += '═══════════════════════════════════════════\n\n';
    schematic += '  COMPONENTS (' + circuit.components.length + '):\n';
    circuit.components.forEach((c, i) => {
        schematic += '  ' + (i+1) + '. [' + c.type.toUpperCase() + '] ' + c.label + '  @ (' + c.x.toFixed(1) + ', ' + c.z.toFixed(1) + ')\n';
    });
    schematic += '\n  CONNECTIONS:\n';
    for (let i = 0; i < circuit.components.length - 1; i++) {
        schematic += '  ' + circuit.components[i].label + ' ──→ ' + circuit.components[i+1].label + '\n';
    }
    schematic += '\n  DESCRIPTION:\n  ' + (circuit.description || '').replace(/(.{70})/g, '$1\n  ') + '\n';
    schematic += '\n  THEORY:\n  ' + (circuit.theory || '').replace(/(.{70})/g, '$1\n  ') + '\n';

    // Download JSON
    const jsonBlob = new Blob([JSON.stringify(exportData, null, 2)], {type: 'application/json'});
    const jsonUrl = URL.createObjectURL(jsonBlob);
    const a1 = document.createElement('a');
    a1.href = jsonUrl;
    a1.download = circuit.title.replace(/[^a-zA-Z0-9]/g, '-').toLowerCase() + '.circuit.json';
    a1.click();
    URL.revokeObjectURL(jsonUrl);

    // Also download schematic text
    setTimeout(() => {
        const txtBlob = new Blob([schematic], {type: 'text/plain'});
        const txtUrl = URL.createObjectURL(txtBlob);
        const a2 = document.createElement('a');
        a2.href = txtUrl;
        a2.download = circuit.title.replace(/[^a-zA-Z0-9]/g, '-').toLowerCase() + '.schematic.txt';
        a2.click();
        URL.revokeObjectURL(txtUrl);
    }, 500);

    showStatus('Circuit exported (JSON + Schematic)');
}

// ─── Submit for PCB Print ────────────────────────────────────────
function submitForPrint() {
    const circuit = circuits[currentCircuit];
    document.getElementById('printCircuitInfo').innerHTML =
        '<strong>' + circuit.title + '</strong><br>' +
        circuit.components.length + ' components · ' +
        (circuit.researcher || 'Custom design');
    document.getElementById('printModal').style.display = 'flex';
}

function closePrintModal() {
    document.getElementById('printModal').style.display = 'none';
}

function confirmPrintSubmit() {
    const circuit = circuits[currentCircuit];
    const order = {
        circuit: circuit.title,
        components: circuit.components.map(c => ({type: c.type, label: c.label})),
        boardSize: document.getElementById('printBoardSize').value,
        layers: document.getElementById('printLayers').value,
        quantity: parseInt(document.getElementById('printQty').value) || 5,
        notes: document.getElementById('printNotes').value,
        submittedAt: new Date().toISOString()
    };

    // Save order locally
    try {
        const orders = JSON.parse(localStorage.getItem('circuit-lab-orders') || '[]');
        orders.push(order);
        localStorage.setItem('circuit-lab-orders', JSON.stringify(orders));
    } catch(e) {}

    // Submit to API
    fetch('/api/alfred-chat.php', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        credentials: 'same-origin',
        body: JSON.stringify({
            message: 'PCB Print Order: ' + circuit.title + ' — ' + order.components.length + ' components, ' +
                     order.boardSize + 'mm, ' + order.layers + '-layer, qty ' + order.quantity +
                     (order.notes ? '. Notes: ' + order.notes : ''),
            agent: 'alfred',
            context: 'User is submitting a PCB print order from the Circuit Lab. Confirm the order and provide estimated timeline and cost guidance.',
            page_url: '/vr/circuit-lab/',
            model: 'auto'
        })
    }).catch(() => {});

    closePrintModal();
    showStatus('✅ Print order submitted! ' + order.quantity + '× ' + order.boardSize + 'mm ' + order.layers + '-layer boards');

    // Also export the circuit data for print reference
    setTimeout(() => exportCircuit(), 1000);
}

// ─── Custom Circuits ─────────────────────────────────────────────
function saveCustomCircuit() {
    const name = document.getElementById('customCircuitName').value.trim();
    const desc = document.getElementById('customCircuitDesc').value.trim();
    if (!name) { showStatus('Enter a circuit name'); return; }

    const current = circuits[currentCircuit];
    const custom = {
        title: name,
        researcher: 'Custom',
        formula: current.formula || '',
        description: desc || current.description,
        theory: '',
        components: JSON.parse(JSON.stringify(current.components))
    };

    customCircuits.push(custom);
    try { localStorage.setItem('circuit-lab-custom', JSON.stringify(customCircuits)); } catch(e) {}

    // Add to circuits array
    circuits.push(custom);

    // Add button
    addCircuitButton(circuits.length - 1, custom);
    renderCustomCircuitsList();

    document.getElementById('customCircuitName').value = '';
    document.getElementById('customCircuitDesc').value = '';
    showStatus('Custom circuit "' + name + '" saved');
}

function addCircuitButton(idx, circuit) {
    const container = document.querySelector('.circuit-select');
    const btn = document.createElement('button');
    btn.className = 'circuit-btn';
    btn.onclick = () => loadCircuit(idx);
    btn.innerHTML = circuit.title + '<span class="researcher">' + (circuit.researcher || 'Custom') + '</span>';
    container.appendChild(btn);
}

function renderCustomCircuitsList() {
    const list = document.getElementById('customCircuitsList');
    if (!list) return;
    if (!customCircuits.length) { list.innerHTML = ''; return; }
    list.innerHTML = '<div style="font-size:.65em;color:#666;margin-bottom:4px">Saved (' + customCircuits.length + '):</div>';
    customCircuits.forEach((c, i) => {
        const idx = 4 + i; // offset by built-in count
        if (idx >= circuits.length) {
            circuits.push(c);
            addCircuitButton(circuits.length - 1, c);
        }
        const div = document.createElement('div');
        div.style.cssText = 'display:flex;justify-content:space-between;align-items:center;padding:2px 4px;font-size:.65em;color:#888';
        div.innerHTML = '<span style="cursor:pointer" onclick="loadCircuit(' + idx + ')">' + c.title + '</span>' +
            '<button onclick="deleteCustomCircuit(' + i + ')" style="background:none;border:none;color:#f44;cursor:pointer;font-size:1em" title="Delete">✕</button>';
        list.appendChild(div);
    });
}

function deleteCustomCircuit(idx) {
    customCircuits.splice(idx, 1);
    try { localStorage.setItem('circuit-lab-custom', JSON.stringify(customCircuits)); } catch(e) {}
    // Rebuild circuits array
    circuits.length = 4; // keep built-in
    customCircuits.forEach(c => circuits.push(c));
    // Rebuild buttons
    const container = document.querySelector('.circuit-select');
    const btns = container.querySelectorAll('.circuit-btn');
    for (let i = 4; i < btns.length; i++) btns[i].remove();
    customCircuits.forEach((c, i) => addCircuitButton(4 + i, c));
    if (currentCircuit >= circuits.length) loadCircuit(0);
    renderCustomCircuitsList();
    showStatus('Circuit deleted');
}
