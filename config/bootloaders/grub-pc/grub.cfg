search --set=root --file /live/vmlinuz

set default=0
set timeout=15

insmod all_video
terminal_output gfxterm
loadfont unicode
insmod font
insmod png
insmod jpeg
set theme=/boot/grub/themes/alfred/theme.txt

set color_normal=white/black
set color_highlight=yellow/dark-gray

# ═══════════════════════════════════════════════════════════
#  LIVE BOOT MODES
# ═══════════════════════════════════════════════════════════

menuentry "  Commander Mode  —  Full Armor + Sovereign AI" {
    search --set=root --file /live/vmlinuz
    linux  /live/vmlinuz boot=live username=alfred nvidia-drm.modeset=1 nvidia-drm.fbdev=1 lsm=landlock,lockdown,yama,integrity,apparmor,bpf components locales=en_US.UTF-8 keyboard-layouts=us timezone=America/New_York quiet splash
    initrd /live/initrd.img
}

menuentry "  Practical Mode  —  Minimal Desktop" {
    search --set=root --file /live/vmlinuz
    linux  /live/vmlinuz boot=live username=alfred nvidia-drm.modeset=1 nvidia-drm.fbdev=1 lsm=landlock,lockdown,yama,integrity,apparmor,bpf components locales=en_US.UTF-8 keyboard-layouts=us timezone=America/New_York alfred.mode=practical quiet splash
