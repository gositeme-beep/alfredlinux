# ============================================================
# Alfred Linux 7.77 — Kingdom of God Edition
# Maximalist Boot Menu — 52 entries / 8 submenus
# ============================================================
if loadfont $prefix/font.pf2 ; then
    set gfxmode=auto
    insmod efi_gop
    insmod efi_uga
    insmod video_bochs
    insmod video_cirrus
    insmod gfxterm
    insmod png
    terminal_output gfxterm
fi

set theme=/boot/grub/themes/alfred/theme.txt
set timeout=20
set default=0
set color_normal=white/black
set color_highlight=black/light-cyan
set menu_color_normal=cyan/black
set menu_color_highlight=black/light-gray

# Common kernel + initrd paths (live-build standard)
set kernel="/live/vmlinuz"
set initrd="/live/initrd.img"
set boot_args="boot=live components quiet splash"

# ---------- TOP-LEVEL ENTRIES ----------
menuentry "🔥  Live (default)  —  Alfred Kingdom Edition" {
    linux  $kernel $boot_args
    initrd $initrd
}

menuentry "💾  Install Alfred  —  graphical (Calamares)" {
    linux  $kernel $boot_args calamares-install
    initrd $initrd
}

# ---------- SUBMENU 1: LIVE VARIANTS (10) ----------
submenu "🔥  Live boot variants  ▸" {
    menuentry "Live (default, KMS)" {
        linux  $kernel $boot_args
        initrd $initrd
    }
    menuentry "Live (safe graphics / nomodeset)" {
        linux  $kernel $boot_args nomodeset xforcevesa
        initrd $initrd
    }
    menuentry "Live (toRAM — copy to RAM, eject USB)" {
        linux  $kernel $boot_args toram
        initrd $initrd
    }
    menuentry "Live (failsafe — single user, recovery shell)" {
        linux  $kernel $boot_args single noapic noapm nodma nomce nolapic nosmp vga=normal
        initrd $initrd
    }
    menuentry "Live (persistence — saves to USB partition)" {
        linux  $kernel $boot_args persistence
        initrd $initrd
    }
    menuentry "Live (encrypted persistence — LUKS)" {
        linux  $kernel $boot_args persistence persistence-encryption=luks
        initrd $initrd
    }
    menuentry "Live (forensic — no auto-mount, no swap, no network)" {
        linux  $kernel $boot_args noeject noprompt nopersistence noswap nonetworking module=forensic
        initrd $initrd
    }
    menuentry "Live (kiosk / Welcome-only)" {
        linux  $kernel $boot_args alfred.mode=kiosk
        initrd $initrd
    }
    menuentry "Live (Sabbath mode — read-only, no network)" {
        linux  $kernel $boot_args alfred.mode=sabbath nonetworking ro
        initrd $initrd
    }
    menuentry "Live (Hebrew / RTL locale)" {
        linux  $kernel $boot_args locales=he_IL.UTF-8 keyboard-layouts=il
        initrd $initrd
    }
    menuentry "← Back" { configfile /boot/grub/grub.cfg }
}

# ---------- SUBMENU 2: INSTALL VARIANTS (6) ----------
submenu "💾  Install variants  ▸" {
    menuentry "Install (graphical — Calamares)" {
        linux  $kernel $boot_args calamares-install
        initrd $initrd
    }
    menuentry "Install (text / debian-installer expert)" {
        linux  $kernel $boot_args install text expert
        initrd $initrd
    }
    menuentry "Install OEM (factory preload mode)" {
        linux  $kernel $boot_args calamares-install alfred.install=oem
        initrd $initrd
    }
    menuentry "Install (automated / preseed)" {
        linux  $kernel $boot_args auto=true preseed/file=/cdrom/preseed.cfg
        initrd $initrd
    }
    menuentry "Install (encrypted FDE — LUKS2 + Kyber)" {
        linux  $kernel $boot_args calamares-install alfred.install=fde-kyber
        initrd $initrd
    }
    menuentry "Install to USB / external drive" {
        linux  $kernel $boot_args calamares-install alfred.install=usb
        initrd $initrd
    }
    menuentry "← Back" { configfile /boot/grub/grub.cfg }
}

# ---------- SUBMENU 3: RESCUE & REPAIR (8) ----------
submenu "🛠  Rescue & repair  ▸" {
    menuentry "Rescue shell (root, no GUI)" {
        linux  $kernel $boot_args rescue/enable=true single
        initrd $initrd
    }
    menuentry "Rescue with networking" {
        linux  $kernel $boot_args rescue/enable=true single networking=true
        initrd $initrd
    }
    menuentry "Boot existing OS on disk (chainload)" {
        insmod chain
        configfile (hd0,1)/boot/grub/grub.cfg
    }
    menuentry "Reinstall GRUB (live shell + script)" {
        linux  $kernel $boot_args alfred.task=grub-reinstall
        initrd $initrd
    }
    menuentry "Filesystem check (fsck all)" {
        linux  $kernel $boot_args alfred.task=fsck-all
        initrd $initrd
    }
    menuentry "Reset root password" {
        linux  $kernel $boot_args alfred.task=reset-root
        initrd $initrd
    }
    menuentry "Restore from snapshot (BTRFS/timeshift)" {
        linux  $kernel $boot_args alfred.task=snapshot-restore
        initrd $initrd
    }
    menuentry "Decrypt LUKS volume (interactive)" {
        linux  $kernel $boot_args alfred.task=luks-decrypt
        initrd $initrd
    }
    menuentry "← Back" { configfile /boot/grub/grub.cfg }
}

# ---------- SUBMENU 4: DIAGNOSTICS (8) ----------
submenu "🧪  Diagnostics  ▸" {
    menuentry "Memtest86+ (BIOS)" {
        linux16 /boot/memtest86+.bin
    }
    menuentry "Memtest86 (UEFI signed)" {
        chainloader /EFI/BOOT/memtestx64.efi
    }
    menuentry "CPU stress test (mprime)" {
        linux  $kernel $boot_args alfred.task=stress-cpu
        initrd $initrd
    }
    menuentry "Disk SMART report" {
        linux  $kernel $boot_args alfred.task=smart-report
        initrd $initrd
    }
    menuentry "Hardware probe (lshw → file)" {
        linux  $kernel $boot_args alfred.task=hwprobe
        initrd $initrd
    }
    menuentry "Network diagnostic (mtr/ping/dig)" {
        linux  $kernel $boot_args alfred.task=netdiag
        initrd $initrd
    }
    menuentry "TPM 2.0 status & PCR dump" {
        linux  $kernel $boot_args alfred.task=tpm-dump
        initrd $initrd
    }
    menuentry "Secure Boot / MOK status" {
        linux  $kernel $boot_args alfred.task=sb-status
        initrd $initrd
    }
    menuentry "← Back" { configfile /boot/grub/grub.cfg }
}

# ---------- SUBMENU 5: SECURITY (5) ----------
submenu "🔐  Security  ▸" {
    menuentry "Enroll MOK key (shim)" {
        chainloader /EFI/BOOT/mmx64.efi
    }
    menuentry "Sign current kernel (sbsign)" {
        linux  $kernel $boot_args alfred.task=sign-kernel
        initrd $initrd
    }
    menuentry "Verify Omahon Seal" {
        linux  $kernel $boot_args alfred.task=verify-omahon
        initrd $initrd
    }
    menuentry "Kingdom-Audit attest now" {
        linux  $kernel $boot_args alfred.task=kingdom-attest
        initrd $initrd
    }
    menuentry "Kyber-1024 self-test" {
        linux  $kernel $boot_args alfred.task=kyber-selftest
        initrd $initrd
    }
    menuentry "← Back" { configfile /boot/grub/grub.cfg }
}

# ---------- SUBMENU 6: FIRMWARE & POWER (6) ----------
submenu "⚙  Firmware & power  ▸" {
    if [ ${grub_platform} == "efi" ]; then
        menuentry "UEFI Firmware Setup" {
            fwsetup
        }
    fi
    menuentry "Boot Device Selection menu" {
        if [ ${grub_platform} == "efi" ]; then
            fwsetup
        else
            echo "Press F12 / F8 / Esc at next reboot for boot menu"
            sleep 4
        fi
    }
    menuentry "iPXE network boot (auto)" {
        chainloader /boot/extras/ipxe/ipxe.lkrn
    }
    menuentry "HTTP boot (UEFI HTTPS netboot)" {
        chainloader /boot/extras/ipxe/ipxe.efi
    }
    menuentry "Reboot" { reboot }
    menuentry "Shutdown" { halt }
    menuentry "← Back" { configfile /boot/grub/grub.cfg }
}

# ---------- SUBMENU 7: NETWORK BOOT (4) ----------
submenu "🌐  Network boot  ▸" {
    menuentry "iPXE (auto-discover)" {
        chainloader /boot/extras/ipxe/ipxe.lkrn
    }
    menuentry "PXE chainload (legacy BIOS)" {
        chainloader /boot/extras/ipxe/undionly.kpxe
    }
    menuentry "TFTP recovery image" {
        linux  $kernel $boot_args alfred.task=tftp-recover
        initrd $initrd
    }
    menuentry "HTTPS-signed netboot (Alfred mirror)" {
        chainloader /boot/extras/ipxe/ipxe.efi
    }
    menuentry "← Back" { configfile /boot/grub/grub.cfg }
}

# ---------- SUBMENU 8: EXTRAS (5) ----------
submenu "🎮  Extras  ▸" {
    menuentry "GRUB command line" {
        echo "Type 'help' for commands. 'normal' to return to menu."
        sleep 2
    }
    menuentry "Plop boot manager (legacy USB-from-CD)" {
        loopback loop /boot/extras/plpbt.iso
        chainloader (loop)/plpbt.bin
    }
    menuentry "FreeDOS (BIOS update from .EXE)" {
        loopback loop /boot/extras/FD13LIVE.iso
        linux  (loop)/isolinux/memdisk iso raw
        initrd /boot/extras/FD13LIVE.iso
    }
    menuentry "SystemRescue (chainload)" {
        loopback loop /boot/extras/systemrescue.iso
        linux  (loop)/sysresccd/boot/x86_64/vmlinuz img_label=SYSRCD img_loop=/boot/extras/systemrescue.iso
        initrd (loop)/sysresccd/boot/x86_64/sysresccd.img
    }
    menuentry "Clonezilla (chainload)" {
        loopback loop /boot/extras/clonezilla.iso
        linux  (loop)/live/vmlinuz boot=live union=overlay username=user config components quiet noswap edd=on nomodeset enforcing=0 noeject locales= keyboard-layouts= ocs_live_run=\"ocs-live-general\" ocs_live_extra_param=\"\" ocs_live_batch=no vga=788 ip= net.ifnames=0 nosplash findiso=/boot/extras/clonezilla.iso toram=filesystem.squashfs
        initrd (loop)/live/initrd.img
    }
    menuentry "← Back" { configfile /boot/grub/grub.cfg }
}

# ---------- ALWAYS-VISIBLE FOOTER ----------
menuentry "↻  Reboot"   { reboot }
menuentry "⏻  Shutdown" { halt }
