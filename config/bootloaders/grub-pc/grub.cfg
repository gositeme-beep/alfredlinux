set superusers="root"
password root alfred

set default=0
set timeout=15

insmod all_video
insmod font
insmod png
insmod jpeg
set theme=/boot/grub/theme.txt

if background_image /boot/grub/splash.png; then
  set color_normal=white/black
  set color_highlight=yellow/dark-gray
else
  set color_normal=cyan/blue
  set color_highlight=white/blue
fi

menuentry "Boot Live: Commander Mode (Full Armor + Sovereign AI)" {
    linux  /live/vmlinuz boot=live components quiet
    initrd /live/initrd.img
}

menuentry "Boot Live: Practical Mode (Minimal Desktop)" {
    linux  /live/vmlinuz boot=live components alfred.mode=practical quiet
    initrd /live/initrd.img
}

menuentry "Boot Live: Cloud Node (Headless Mesh Server)" {
    linux  /live/vmlinuz boot=live components systemd.unit=multi-user.target alfred.mode=node quiet
    initrd /live/initrd.img
}

menuentry "Install: Standard (Graphical Setup)" {
    linux  /live/vmlinuz boot=live components calamares-install quiet
    initrd /live/initrd.img
}

menuentry "Install: Full Disk Encryption (LUKS2 + Kyber Post-Quantum)" {
    linux  /live/vmlinuz boot=live components calamares-install alfred.install=fde-kyber quiet
    initrd /live/initrd.img
}

menuentry "Install: OEM Preload (Factory Deployment)" {
    linux  /live/vmlinuz boot=live components calamares-install alfred.install=oem quiet
    initrd /live/initrd.img
}

menuentry "Install: USB / External Drive (Portable Storage)" {
    linux  /live/vmlinuz boot=live components calamares-install alfred.install=usb quiet
    initrd /live/initrd.img
}

submenu "Rescue & Diagnostics: The Shepherd's Staff >" {
    menuentry "Rescue Shell (Root, no GUI)" {
        linux  /live/vmlinuz boot=live components rescue/enable=true single
        initrd /live/initrd.img
    }
    menuentry "Memtest86+ (BIOS)" {
        linux16 /boot/memtest86+.bin
    }
    menuentry "Memtest86 (UEFI signed)" {
        chainloader /EFI/BOOT/memtestx64.efi
    }
    menuentry "TPM 2.0 Status & PCR Dump" {
        linux  /live/vmlinuz boot=live components alfred.task=tpm-dump
        initrd /live/initrd.img
    }
    menuentry "Decrypt LUKS Volume" {
        linux  /live/vmlinuz boot=live components alfred.task=luks-decrypt
        initrd /live/initrd.img
    }
    menuentry "<- Back" { configfile /boot/grub/grub.cfg }
}

submenu "Advanced Options (BIOS777) >" {
    menuentry "Live (forensic - no auto-mount/swap/network)" {
        linux  /live/vmlinuz boot=live components config noeject noprompt nopersistence noswap nonetworking module=forensic
        initrd /live/initrd.img
    }
    menuentry "Live (encrypted persistence - LUKS)" {
        linux  /live/vmlinuz boot=live components config persistence persistence-encryption=luks
        initrd /live/initrd.img
    }
    menuentry "Live (Hebrew / RTL locale)" {
        linux  /live/vmlinuz boot=live components config locales=he_IL.UTF-8 keyboard-layouts=il
        initrd /live/initrd.img
    }
    menuentry "Reinstall GRUB task" {
        linux  /live/vmlinuz boot=live components config alfred.task=grub-reinstall
        initrd /live/initrd.img
    }
    menuentry "Filesystem check task" {
        linux  /live/vmlinuz boot=live components config alfred.task=fsck-all
        initrd /live/initrd.img
    }
    menuentry "Reset root password task" {
        linux  /live/vmlinuz boot=live components config alfred.task=reset-root
        initrd /live/initrd.img
    }
    menuentry "Restore from snapshot task" {
        linux  /live/vmlinuz boot=live components config alfred.task=snapshot-restore
        initrd /live/initrd.img
    }
    menuentry "CPU stress test task" {
        linux  /live/vmlinuz boot=live components config alfred.task=stress-cpu
        initrd /live/initrd.img
    }
    menuentry "Disk SMART report task" {
        linux  /live/vmlinuz boot=live components config alfred.task=smart-report
        initrd /live/initrd.img
    }
    menuentry "Hardware probe task" {
        linux  /live/vmlinuz boot=live components config alfred.task=hwprobe
        initrd /live/initrd.img
    }
    menuentry "Secure Boot / MOK status task" {
        linux  /live/vmlinuz boot=live components config alfred.task=sb-status
        initrd /live/initrd.img
    }
    menuentry "Verify Omahon Seal task" {
        linux  /live/vmlinuz boot=live components config alfred.task=verify-omahon
        initrd /live/initrd.img
    }
    menuentry "Kingdom-Audit attest task" {
        linux  /live/vmlinuz boot=live components config alfred.task=kingdom-attest
        initrd /live/initrd.img
    }
    menuentry "Kyber-1024 self-test task" {
        linux  /live/vmlinuz boot=live components config alfred.task=kyber-selftest
        initrd /live/initrd.img
    }
    menuentry "Live kiosk mode" {
        linux  /live/vmlinuz boot=live components config alfred.mode=kiosk
        initrd /live/initrd.img
    }
    menuentry "Live Sabbath mode" {
        linux  /live/vmlinuz boot=live components config alfred.mode=sabbath nonetworking ro
        initrd /live/initrd.img
    }
    menuentry "<- Back" { configfile /boot/grub/grub.cfg }
}
