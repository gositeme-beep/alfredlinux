# ═══════════════════════════════════════════════════════════
#  RESCUE & DIAGNOSTICS — The Shepherd's Staff
# ═══════════════════════════════════════════════════════════

submenu "  Rescue & Diagnostics  —  The Shepherd's Staff  >" {
    menuentry "  Rescue Shell (Root, no GUI)" {
        search --set=root --file /live/vmlinuz
        linux  /live/vmlinuz boot=live username=alfred nvidia-drm.modeset=1 nvidia-drm.fbdev=1 lsm=landlock,lockdown,yama,integrity,apparmor,bpf components locales=en_US.UTF-8 keyboard-layouts=us timezone=America/New_York rescue/enable=true single quiet splash
        initrd /live/initrd.img
    }
    menuentry "  Memtest86+ (BIOS)" {
        linux16 /boot/memtest86+.bin
    }
    menuentry "  Memtest86 (UEFI signed)" {
        chainloader /EFI/BOOT/memtestx64.efi
    }
    menuentry "  TPM 2.0 Status & PCR Dump" {
        search --set=root --file /live/vmlinuz
        linux  /live/vmlinuz boot=live username=alfred nvidia-drm.modeset=1 nvidia-drm.fbdev=1 lsm=landlock,lockdown,yama,integrity,apparmor,bpf components locales=en_US.UTF-8 keyboard-layouts=us timezone=America/New_York alfred.task=tpm-dump quiet splash
        initrd /live/initrd.img
    }
    menuentry "  Decrypt LUKS Volume" {
        search --set=root --file /live/vmlinuz
        linux  /live/vmlinuz boot=live username=alfred nvidia-drm.modeset=1 nvidia-drm.fbdev=1 lsm=landlock,lockdown,yama,integrity,apparmor,bpf components locales=en_US.UTF-8 keyboard-layouts=us timezone=America/New_York alfred.task=luks-decrypt quiet splash
        initrd /live/initrd.img
    }
    menuentry "  <- Back" { configfile /boot/grub/grub.cfg }
}

