label live-amd64
    menu label ^Boot Live: Commander Mode (Full Armor + Sovereign AI)
    menu default
    linux /live/vmlinuz
    initrd /live/initrd.img
    append boot=live username=alfred nvidia-drm.modeset=1 lsm=landlock,lockdown,yama,integrity,apparmor,tomoyo components quiet

label live-amd64-practical
    menu label ^Boot Live: Practical Mode (Minimal Desktop)
    linux /live/vmlinuz
    initrd /live/initrd.img
    append boot=live username=alfred nvidia-drm.modeset=1 lsm=landlock,lockdown,yama,integrity,apparmor,tomoyo components alfred.mode=practical quiet

label live-amd64-cloud
    menu label ^Boot Live: Cloud Node (Headless Server)
    linux /live/vmlinuz
    initrd /live/initrd.img
    append boot=live username=alfred nvidia-drm.modeset=1 lsm=landlock,lockdown,yama,integrity,apparmor,tomoyo components systemd.unit=multi-user.target alfred.mode=node quiet

label install-standard
    menu label ^Install: Standard (Graphical Setup)
    linux /live/vmlinuz
    initrd /live/initrd.img
    append boot=live username=alfred nvidia-drm.modeset=1 lsm=landlock,lockdown,yama,integrity,apparmor,tomoyo components calamares-install quiet

label install-fde
    menu label ^Install: Full Disk Encryption (LUKS2 + Kyber)
    linux /live/vmlinuz
    initrd /live/initrd.img
    append boot=live username=alfred nvidia-drm.modeset=1 lsm=landlock,lockdown,yama,integrity,apparmor,tomoyo components calamares-install alfred.install=fde-kyber quiet

label install-oem
    menu label ^Install: OEM Preload (Factory Deployment)
    linux /live/vmlinuz
    initrd /live/initrd.img
    append boot=live username=alfred nvidia-drm.modeset=1 lsm=landlock,lockdown,yama,integrity,apparmor,tomoyo components calamares-install alfred.install=oem quiet

label install-usb
    menu label ^Install: USB / External Drive (Portable)
    linux /live/vmlinuz
    initrd /live/initrd.img
    append boot=live username=alfred nvidia-drm.modeset=1 lsm=landlock,lockdown,yama,integrity,apparmor,tomoyo components calamares-install alfred.install=usb quiet

label rescue
    menu label ^Rescue & Diagnostics (Root shell)
    linux /live/vmlinuz
    initrd /live/initrd.img
    append boot=live username=alfred nvidia-drm.modeset=1 lsm=landlock,lockdown,yama,integrity,apparmor,tomoyo components rescue/enable=true single
