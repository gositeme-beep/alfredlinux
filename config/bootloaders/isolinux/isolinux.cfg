UI vesamenu.c32
TIMEOUT 150
PROMPT 0
DEFAULT safe-graphics

MENU TITLE Alfred Linux 7.77 — Kingdom of God Edition
MENU BACKGROUND splash.png

MENU COLOR title        * #FFFFD700 #00000000 *
MENU COLOR border       * #00000000 #00000000 none
MENU COLOR sel          * #FF000000 #AAFFD700 *
MENU COLOR hotsel       1;7;37;40 #FF000000 #AAFFD700 *
MENU COLOR unsel        * #FFb0b8c8 #00000000 *
MENU COLOR tabmsg       * #FFFFFFFF #00000000 *
MENU COLOR help         37;40 #FFFFD700 #00000000 none
MENU HSHIFT 25
MENU VSHIFT 14
MENU ROWS 14
MENU HELPMSGROW 22
MENU CMDLINEROW 23
MENU TIMEOUTROW 23
MENU TABMSGROW 24
MENU TABMSG Press ENTER to boot, TAB to edit options
MENU AUTOBOOT Booting Alfred Linux in # second{,s}...

LABEL commander
    MENU LABEL ^Commander Mode — Full Armor + Sovereign AI
    KERNEL /live/vmlinuz
    INITRD /live/initrd.img
    APPEND boot=live username=alfred nvidia-drm.modeset=1 nvidia-drm.fbdev=1 lsm=landlock,lockdown,yama,integrity,apparmor,bpf components locales=en_US.UTF-8 keyboard-layouts=us timezone=America/New_York quiet splash

LABEL practical
    MENU LABEL ^Practical Mode — Minimal Desktop
    KERNEL /live/vmlinuz
    INITRD /live/initrd.img
    APPEND boot=live username=alfred nvidia-drm.modeset=1 nvidia-drm.fbdev=1 lsm=landlock,lockdown,yama,integrity,apparmor,bpf components alfred.mode=practical locales=en_US.UTF-8 keyboard-layouts=us timezone=America/New_York quiet splash

LABEL cloud
    MENU LABEL ^Cloud Node — Headless Mesh Server
    KERNEL /live/vmlinuz
    INITRD /live/initrd.img
    APPEND boot=live username=alfred nvidia-drm.modeset=1 nvidia-drm.fbdev=1 lsm=landlock,lockdown,yama,integrity,apparmor,bpf components systemd.unit=multi-user.target alfred.mode=node locales=en_US.UTF-8 keyboard-layouts=us timezone=America/New_York quiet splash

LABEL safe-graphics
    MENU LABEL ^Safe Graphics — VM / No GPU / Fallback
    MENU DEFAULT
    KERNEL /live/vmlinuz
    INITRD /live/initrd.img
    APPEND boot=live username=alfred nomodeset lsm=landlock,lockdown,yama,integrity,apparmor,bpf components locales=en_US.UTF-8 keyboard-layouts=us timezone=America/New_York quiet splash

MENU SEPARATOR

LABEL install-standard
    MENU LABEL ^Install: Standard (Graphical Setup)
    KERNEL /live/vmlinuz
    INITRD /live/initrd.img
    APPEND boot=live username=alfred nvidia-drm.modeset=1 nvidia-drm.fbdev=1 lsm=landlock,lockdown,yama,integrity,apparmor,bpf components calamares-install locales=en_US.UTF-8 keyboard-layouts=us timezone=America/New_York quiet splash

LABEL install-fde
    MENU LABEL ^Install: Full Disk Encryption (LUKS2 + Kyber)
    KERNEL /live/vmlinuz
    INITRD /live/initrd.img
    APPEND boot=live username=alfred nvidia-drm.modeset=1 nvidia-drm.fbdev=1 lsm=landlock,lockdown,yama,integrity,apparmor,bpf components calamares-install alfred.install=fde-kyber locales=en_US.UTF-8 keyboard-layouts=us timezone=America/New_York quiet splash

LABEL install-oem
    MENU LABEL ^Install: OEM Preload (Factory)
    KERNEL /live/vmlinuz
    INITRD /live/initrd.img
    APPEND boot=live username=alfred nvidia-drm.modeset=1 nvidia-drm.fbdev=1 lsm=landlock,lockdown,yama,integrity,apparmor,bpf components calamares-install alfred.install=oem locales=en_US.UTF-8 keyboard-layouts=us timezone=America/New_York quiet splash

LABEL install-usb
    MENU LABEL ^Install: USB / External Drive (Portable)
    KERNEL /live/vmlinuz
    INITRD /live/initrd.img
    APPEND boot=live username=alfred nvidia-drm.modeset=1 nvidia-drm.fbdev=1 lsm=landlock,lockdown,yama,integrity,apparmor,bpf components calamares-install alfred.install=usb locales=en_US.UTF-8 keyboard-layouts=us timezone=America/New_York quiet splash

LABEL install-safe
    MENU LABEL ^Install: Safe Graphics (VM / No GPU)
    KERNEL /live/vmlinuz
    INITRD /live/initrd.img
    APPEND boot=live username=alfred nomodeset lsm=landlock,lockdown,yama,integrity,apparmor,bpf components calamares-install locales=en_US.UTF-8 keyboard-layouts=us timezone=America/New_York quiet splash
