# Alfred Linux ??? Native Wayland for all toolkits
# Firefox: native Wayland rendering (no XWayland blur)
MOZ_ENABLE_WAYLAND=1
# Electron apps (VS Code, Discord, Signal, etc.): native Wayland via Ozone
ELECTRON_OZONE_PLATFORM_HINT=auto
# Qt apps: prefer Wayland, graceful fallback to X11
QT_QPA_PLATFORM=wayland;xcb
# GTK apps: prefer Wayland, graceful fallback to X11
GDK_BACKEND=wayland,x11
# SDL games/apps: native Wayland
SDL_VIDEODRIVER=wayland,x11
# Clutter-based apps
CLUTTER_BACKEND=wayland
# Java AWT apps on Wayland
_JAVA_AWT_WM_NONREPARENTING=1
# XDG session type
XDG_SESSION_TYPE=wayland
# Cursor theme consistency across all toolkits
XCURSOR_THEME=breeze_cursors
XCURSOR_SIZE=24
