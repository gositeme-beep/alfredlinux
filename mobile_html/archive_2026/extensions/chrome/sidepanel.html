<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alfred AI — Side Panel</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0a0a14; color: #e2e8f0; height: 100vh; display: flex; flex-direction: column;
    }

    /* Header */
    .sp-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px; background: #12121e;
      border-bottom: 1px solid rgba(255,255,255,.06);
    }
    .sp-brand { display: flex; align-items: center; gap: 10px; }
    .sp-logo {
      width: 32px; height: 32px; border-radius: 10px;
      background: linear-gradient(135deg,#6c5ce7,#0984e3);
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 1rem; color: #fff;
    }
    .sp-brand h1 {
      font-size: 1.05rem; font-weight: 700;
      background: linear-gradient(135deg,#6c5ce7,#0984e3);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .sp-header-actions { display: flex; gap: 8px; }
    .sp-icon-btn {
      background: rgba(255,255,255,.06); border: none; color: #94a3b8;
      width: 32px; height: 32px; border-radius: 8px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; font-size: .9rem;
    }
    .sp-icon-btn:hover { background: rgba(108,92,231,.15); color: #e2e8f0; }

    /* Page Context Bar */
    .sp-context {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 16px; background: rgba(108,92,231,.06);
      border-bottom: 1px solid rgba(255,255,255,.04);
      font-size: .78rem; color: #94a3b8;
    }
    .sp-context-icon { font-size: 1rem; }
    .sp-context-info { flex: 1; overflow: hidden; }
    .sp-context-title { font-weight: 600; color: #e2e8f0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sp-context-url { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: .72rem; }

    /* Tools Quick Access */
    .sp-tools {
      display: flex; gap: 6px; padding: 10px 16px; overflow-x: auto;
      border-bottom: 1px solid rgba(255,255,255,.04);
    }
    .sp-tools::-webkit-scrollbar { height: 3px; }
    .sp-tools::-webkit-scrollbar-thumb { background: rgba(108,92,231,.3); border-radius: 3px; }
    .sp-tool-chip {
      flex-shrink: 0; padding: 6px 14px; border-radius: 20px;
      background: #12121e; border: 1px solid rgba(255,255,255,.08);
      color: #e2e8f0; font-size: .76rem; font-weight: 600; cursor: pointer;
      transition: border-color .2s, background .2s;
    }
    .sp-tool-chip:hover { border-color: #6c5ce7; background: rgba(108,92,231,.1); }

    /* Messages Area */
    .sp-messages {
      flex: 1; overflow-y: auto; padding: 16px;
      display: flex; flex-direction: column; gap: 12px;
    }
    .sp-messages::-webkit-scrollbar { width: 4px; }
    .sp-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 4px; }

    .sp-msg {
      max-width: 88%; padding: 12px 16px; border-radius: 14px;
      font-size: .88rem; line-height: 1.55; word-wrap: break-word;
    }
    .sp-msg--user {
      align-self: flex-end;
      background: linear-gradient(135deg,#6c5ce7,#0984e3); color: #fff;
      border-bottom-right-radius: 4px;
    }
    .sp-msg--assistant {
      align-self: flex-start;
      background: #12121e; color: #e2e8f0;
      border: 1px solid rgba(255,255,255,.06);
      border-bottom-left-radius: 4px;
    }
    .sp-msg--system {
      align-self: center; text-align: center;
      color: #94a3b8; font-size: .8rem; font-style: italic;
    }
    .sp-typing {
      display: inline-flex; gap: 4px; padding: 10px 16px;
      background: #12121e; border-radius: 14px; align-self: flex-start;
    }
    .sp-typing span {
      width: 6px; height: 6px; border-radius: 50%; background: #6c5ce7;
      animation: typingBounce .6s infinite alternate;
    }
    .sp-typing span:nth-child(2) { animation-delay: .15s; }
    .sp-typing span:nth-child(3) { animation-delay: .3s; }
    @keyframes typingBounce { to { opacity: .3; transform: translateY(-4px); } }

    /* Input Area */
    .sp-input-area {
      padding: 12px 16px; background: #12121e;
      border-top: 1px solid rgba(255,255,255,.06);
    }
    .sp-input-wrap {
      display: flex; gap: 8px; align-items: flex-end;
      background: #1a1a2e; border: 1px solid rgba(255,255,255,.08);
      border-radius: 14px; padding: 8px 10px 8px 16px;
    }
    .sp-input-wrap:focus-within { border-color: #6c5ce7; }
    .sp-textarea {
      flex: 1; background: none; border: none; color: #e2e8f0;
      font-size: .9rem; font-family: inherit; resize: none;
      outline: none; min-height: 22px; max-height: 120px;
      line-height: 1.5;
    }
    .sp-textarea::placeholder { color: #64748b; }
    .sp-voice-btn {
      width: 34px; height: 34px; border-radius: 50%; border: none;
      background: rgba(108,92,231,.15); color: #a29bfe; cursor: pointer;
      display: flex; align-items: center; justify-content: center; font-size: .95rem;
      transition: background .2s;
    }
    .sp-voice-btn:hover { background: rgba(108,92,231,.25); }
    .sp-voice-btn.recording { background: rgba(214,48,49,.25); color: #ff7675; animation: pulse 1.5s infinite; }
    @keyframes pulse { 50% { transform: scale(1.08); } }
    .sp-send-btn {
      width: 34px; height: 34px; border-radius: 10px; border: none;
      background: linear-gradient(135deg,#6c5ce7,#0984e3); color: #fff;
      cursor: pointer; font-size: .9rem; display: flex; align-items: center; justify-content: center;
      transition: transform .15s;
    }
    .sp-send-btn:hover { transform: scale(1.05); }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="sp-header">
    <div class="sp-brand">
      <div class="sp-logo">A</div>
      <h1>Alfred AI</h1>
    </div>
    <div class="sp-header-actions">
      <button class="sp-icon-btn" id="clearBtn" title="Clear chat">🗑</button>
      <button class="sp-icon-btn" id="spSettingsBtn" title="Settings">⚙</button>
    </div>
  </div>

  <!-- Page Context -->
  <div class="sp-context" id="pageContext">
    <span class="sp-context-icon">🌐</span>
    <div class="sp-context-info">
      <div class="sp-context-title" id="ctxTitle">No page context</div>
      <div class="sp-context-url" id="ctxUrl"></div>
    </div>
  </div>

  <!-- Tools Quick Access -->
  <div class="sp-tools">
    <button class="sp-tool-chip" data-action="summarize">📝 Summarize</button>
    <button class="sp-tool-chip" data-action="seo">📊 SEO Check</button>
    <button class="sp-tool-chip" data-action="security">🔒 Security</button>
    <button class="sp-tool-chip" data-action="code">💻 Code Review</button>
    <button class="sp-tool-chip" data-action="translate">🌍 Translate</button>
    <button class="sp-tool-chip" data-action="rewrite">✍️ Rewrite</button>
  </div>

  <!-- Messages -->
  <div class="sp-messages" id="messages">
    <div class="sp-msg sp-msg--system">Welcome! Ask me anything or use the quick tools above.</div>
  </div>

  <!-- Input -->
  <div class="sp-input-area">
    <div class="sp-input-wrap">
      <textarea class="sp-textarea" id="msgInput" placeholder="Ask Alfred anything…" rows="1"></textarea>
      <button class="sp-voice-btn" id="voiceBtn" title="Voice input">🎤</button>
      <button class="sp-send-btn" id="spSendBtn" title="Send">➤</button>
    </div>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
