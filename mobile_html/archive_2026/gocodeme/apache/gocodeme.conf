# =============================================================================
# GoCodeMe – Apache Reverse Proxy Configuration
# For Apache 2.4+ with mod_proxy, mod_proxy_http, mod_proxy_wstunnel
# =============================================================================
#
# INSTALLATION (as root / sudo):
#   a2enmod proxy proxy_http proxy_wstunnel headers rewrite
#   cp gocodeme.conf /etc/apache2/conf-available/gocodeme.conf    # Debian/Ubuntu
#   a2enconf gocodeme
#   systemctl reload apache2
#
# For DirectAdmin / cPanel managed hosts, place the ProxyPass directives
# inside your existing <VirtualHost> block in the DA custom httpd include,
# typically at:  ~/domains/gositeme.com/public_html/  (or ask host to add them)
#
# Services proxied:
#   /gocodeme/api/*   →  http://127.0.0.1:3001  (Middleware)
#   /gocodeme/mcp/*   →  http://127.0.0.1:3005  (MCP Server – SSE, long timeout)
#   /gocodeme/oc/*    →  http://127.0.0.1:3004  (OpenClaw)
#   /gocodeme/        →  http://127.0.0.1:3001  (Middleware static/dashboard)
# =============================================================================

<IfModule mod_proxy.c>

    # -------------------------------------------------------------------------
    # Security: never expose internal proxy to the outside world
    # -------------------------------------------------------------------------
    ProxyRequests Off
    ProxyPreserveHost On

    <Proxy *>
        Require all granted
    </Proxy>

    # -------------------------------------------------------------------------
    # Rate-limit hint: use mod_ratelimit or mod_evasive at the VirtualHost level
    # -------------------------------------------------------------------------

    # -------------------------------------------------------------------------
    # Middleware – REST API + Dashboard  (port 3001)
    # -------------------------------------------------------------------------
    ProxyPass        /gocodeme/api/  http://127.0.0.1:3001/api/  connectiontimeout=10 timeout=60
    ProxyPassReverse /gocodeme/api/  http://127.0.0.1:3001/api/

    ProxyPass        /gocodeme/health  http://127.0.0.1:3001/health
    ProxyPassReverse /gocodeme/health  http://127.0.0.1:3001/health

    # Dashboard + static files served by the middleware
    ProxyPass        /gocodeme/  http://127.0.0.1:3001/
    ProxyPassReverse /gocodeme/  http://127.0.0.1:3001/

    # -------------------------------------------------------------------------
    # MCP Server – SSE streams  (port 3005)
    # Must come BEFORE the /gocodeme/ catch-all above if using same prefix,
    # but here we use a distinct /gocodeme/mcp/ prefix.
    # -------------------------------------------------------------------------
    # SSE requires: no buffering, long read timeout
    ProxyPass        /gocodeme/mcp/  http://127.0.0.1:3005/  connectiontimeout=10 timeout=3600 nocanon
    ProxyPassReverse /gocodeme/mcp/  http://127.0.0.1:3005/

    # -------------------------------------------------------------------------
    # OpenClaw  (port 3004)
    # -------------------------------------------------------------------------
    ProxyPass        /gocodeme/oc/  http://127.0.0.1:3004/  connectiontimeout=10 timeout=60
    ProxyPassReverse /gocodeme/oc/  http://127.0.0.1:3004/

    # -------------------------------------------------------------------------
    # Forward real client IP to Node services
    # -------------------------------------------------------------------------
    <IfModule mod_headers.c>
        RequestHeader set X-Forwarded-Proto "https"
        RequestHeader set X-Real-IP         "%{REMOTE_ADDR}e"
    </IfModule>

</IfModule>

# =============================================================================
# Optional: dedicated VirtualHost block
# Use this if you want a subdomain  gocodeme.gositeme.com  instead of a path.
# =============================================================================
#
# <VirtualHost *:443>
#     ServerName gocodeme.gositeme.com
#     ServerAlias www.gocodeme.gositeme.com
#
#     SSLEngine on
#     SSLCertificateFile    /path/to/fullchain.pem
#     SSLCertificateKeyFile /path/to/privkey.pem
#
#     ProxyRequests Off
#     ProxyPreserveHost On
#
#     # Middleware (API + dashboard)
#     ProxyPass        /  http://127.0.0.1:3001/  connectiontimeout=10 timeout=60
#     ProxyPassReverse /  http://127.0.0.1:3001/
#
#     # SSE streams (Claude chat, MCP)
#     <Location /api/claude/chat>
#         ProxyPass        http://127.0.0.1:3001/api/claude/chat nocanon
#         ProxyPassReverse http://127.0.0.1:3001/api/claude/chat
#     </Location>
#
#     <IfModule mod_headers.c>
#         RequestHeader set X-Forwarded-Proto "https"
#         RequestHeader set X-Real-IP         "%{REMOTE_ADDR}e"
#         Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
#     </IfModule>
#
#     ErrorLog  ${APACHE_LOG_DIR}/gocodeme_error.log
#     CustomLog ${APACHE_LOG_DIR}/gocodeme_access.log combined
# </VirtualHost>
