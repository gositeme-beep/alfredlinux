version: '3.9'

# GoCodeMe Full Stack
# Services: middleware API, MCP HTTP server, Redis, Nginx reverse proxy
# Note: Theia IDE and OpenHands are separate forks — add them once forked.

services:

  # ── GoCodeMe Middleware ────────────────────────────────────────────────────
  middleware:
    build:
      context: ./middleware
      dockerfile: Dockerfile
    container_name: gocodeme-middleware
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      DA_HOST: ${DA_HOST}
      DA_ADMIN_USER: ${DA_ADMIN_USER}
      DA_ADMIN_PASS: ${DA_ADMIN_PASS}
      WHMCS_API_URL: ${WHMCS_API_URL}
      WHMCS_API_IDENTIFIER: ${WHMCS_API_IDENTIFIER}
      WHMCS_API_SECRET: ${WHMCS_API_SECRET}
      WHMCS_WEBHOOK_SECRET: ${WHMCS_WEBHOOK_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./middleware/logs:/app/logs
    networks:
      - gocodeme

  # ── MCP HTTP Server ────────────────────────────────────────────────────────
  mcp-server:
    build:
      context: ./mcp-server
      dockerfile: Dockerfile
    container_name: gocodeme-mcp
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      MCP_PORT: 3002
      DA_HOST: ${DA_HOST}
      DA_ADMIN_USER: ${DA_ADMIN_USER}
      DA_ADMIN_PASS: ${DA_ADMIN_PASS}
      JWT_SECRET: ${JWT_SECRET}
    networks:
      - gocodeme

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: gocodeme-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - gocodeme

  # ── Nginx reverse proxy ────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: gocodeme-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - certbot-www:/var/www/certbot:ro
    depends_on:
      - middleware
      - mcp-server
    networks:
      - gocodeme

volumes:
  redis-data:
  certbot-www:

networks:
  gocodeme:
    driver: bridge
