worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;

    # Redirect HTTP → HTTPS
    server {
        listen 80;
        server_name gocodeme.com www.gocodeme.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS — GoCodeMe middleware API
    server {
        listen 443 ssl http2;
        server_name gocodeme.com www.gocodeme.com;

        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Middleware API
        location /api/ {
            limit_req zone=api burst=10 nodelay;
            proxy_pass         http://middleware:3001;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # MCP server (SSE — needs long timeout)
        location /mcp/ {
            proxy_pass             http://mcp-server:3005;
            proxy_http_version     1.1;
            proxy_set_header       Connection "";
            proxy_read_timeout     3600s;
            proxy_buffering        off;
            proxy_cache            off;
            proxy_set_header       Host              $host;
            proxy_set_header       X-Real-IP         $remote_addr;
            proxy_set_header       Authorization     $http_authorization;
        }

        # Health
        location /health {
            proxy_pass http://middleware:3001/health;
        }
    }
}
