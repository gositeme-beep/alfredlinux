<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 360px; min-height: 400px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a14; color: #e8e8f0; }
.header { padding: 14px 16px; border-bottom: 1px solid rgba(255,255,255,0.08); display: flex; align-items: center; justify-content: space-between; }
.header h1 { font-size: 15px; color: #8B5CF6; }
.header .badge { font-size: 10px; padding: 2px 8px; border-radius: 10px; background: #10B981; color: #fff; }
.open-full { display: block; text-align: center; padding: 14px; color: #8B5CF6; text-decoration: none; font-size: 13px; font-weight: 500; border-top: 1px solid rgba(255,255,255,0.08); }
.open-full:hover { background: rgba(139,92,246,0.1); }
.conversations { padding: 8px; }
.convo { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 10px; cursor: pointer; transition: background .2s; }
.convo:hover { background: rgba(255,255,255,0.05); }
.convo-avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, #8B5CF6, #06B6D4); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 16px; flex-shrink: 0; }
.convo-info { flex: 1; min-width: 0; }
.convo-name { font-size: 13px; font-weight: 500; }
.convo-preview { font-size: 12px; color: #6b6b88; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.convo-meta { text-align: right; }
.convo-time { font-size: 10px; color: #6b6b88; }
.convo-unread { font-size: 10px; padding: 1px 6px; border-radius: 10px; background: #8B5CF6; color: #fff; margin-top: 4px; display: inline-block; }
.security-note { padding: 12px 16px; text-align: center; font-size: 11px; color: #6b6b88; }
.security-note i { color: #10B981; }
.empty { text-align: center; padding: 40px 20px; color: #6b6b88; font-size: 13px; }
</style>
<link rel="stylesheet" href="/assets/vendor/fontawesome/6.5.1/css/all.min.css">
</head>
<body>
  <div class="header">
    <h1><i class="fas fa-shield-halved"></i> Veil</h1>
    <span class="badge">E2E Encrypted</span>
  </div>

  <div class="security-note">
    <i class="fas fa-lock"></i> AES-256-GCM + Kyber-1024 Post-Quantum
  </div>

  <div class="conversations" id="convos">
    <div class="empty">
      <i class="fas fa-comments" style="font-size:24px;margin-bottom:8px;display:block;color:#8B5CF6"></i>
      Sign in to view conversations
    </div>
  </div>

  <a href="https://gositeme.com/veil" target="_blank" class="open-full">
    Open Veil Messenger <i class="fas fa-external-link-alt"></i>
  </a>

<script>
chrome.runtime.sendMessage({ action: 'popupOpened' });

async function loadConversations() {
  try {
    const res = await fetch('https://gositeme.com/comms/api/conversations.php?action=list&limit=8', { credentials: 'include' });
    const data = await res.json();
    if (data.success && data.conversations && data.conversations.length) {
      document.getElementById('convos').innerHTML = data.conversations.map(c => {
        const initials = (c.name || '?').split(' ').map(n => n[0]).join('').toUpperCase().slice(0,2);
        return `<div class="convo" onclick="window.open('https://gositeme.com/veil/chat/${c.id}')">
          <div class="convo-avatar">${initials}</div>
          <div class="convo-info">
            <div class="convo-name">${c.name || 'Unknown'}</div>
            <div class="convo-preview">${c.last_message || 'No messages yet'}</div>
          </div>
          <div class="convo-meta">
            <div class="convo-time">${c.last_at ? new Date(c.last_at).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) : ''}</div>
            ${c.unread ? '<div class="convo-unread">' + c.unread + '</div>' : ''}
          </div>
        </div>`;
      }).join('');
    }
  } catch(e) {}
}

loadConversations();
</script>
</body>
</html>
