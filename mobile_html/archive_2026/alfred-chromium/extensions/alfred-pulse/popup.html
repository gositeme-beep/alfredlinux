<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 380px; min-height: 400px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a1a1a; color: #e8e8f0; }
.header { padding: 14px 16px; border-bottom: 1px solid rgba(255,255,255,0.08); display: flex; align-items: center; justify-content: space-between; }
.header h1 { font-size: 15px; color: #10B981; }
.compose { display: flex; gap: 8px; padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,0.05); }
.compose input { flex: 1; padding: 8px 12px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; color: #e8e8f0; font-size: 13px; outline: none; }
.compose button { padding: 8px 16px; background: #10B981; border: none; border-radius: 20px; color: #fff; font-size: 13px; font-weight: 600; cursor: pointer; }
.compose button:hover { background: #059669; }
.feed { padding: 8px 0; max-height: 350px; overflow-y: auto; }
.post { padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,0.04); }
.post-header { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
.post-avatar { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, #10B981, #06B6D4); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; flex-shrink: 0; }
.post-name { font-size: 13px; font-weight: 500; }
.post-time { font-size: 11px; color: #6b6b88; }
.post-body { font-size: 13px; line-height: 1.5; color: #c0c0d0; }
.post-actions { display: flex; gap: 16px; margin-top: 8px; }
.post-action { font-size: 12px; color: #6b6b88; cursor: pointer; display: flex; align-items: center; gap: 4px; }
.post-action:hover { color: #10B981; }
.open-full { display: block; text-align: center; padding: 14px; color: #10B981; text-decoration: none; font-size: 13px; font-weight: 500; border-top: 1px solid rgba(255,255,255,0.08); }
.open-full:hover { background: rgba(16,185,129,0.1); }
.empty { text-align: center; padding: 40px 20px; color: #6b6b88; font-size: 13px; }
</style>
<link rel="stylesheet" href="/assets/vendor/fontawesome/6.5.1/css/all.min.css">
</head>
<body>
  <div class="header">
    <h1><i class="fas fa-fire"></i> Pulse</h1>
  </div>

  <div class="compose">
    <input type="text" id="postInput" placeholder="What's happening?">
    <button onclick="createPost()">Post</button>
  </div>

  <div class="feed" id="feed">
    <div class="empty">
      <i class="fas fa-fire" style="font-size:24px;margin-bottom:8px;display:block;color:#10B981"></i>
      Loading feed...
    </div>
  </div>

  <a href="https://gositeme.com/pulse" target="_blank" class="open-full">
    Open Pulse Social <i class="fas fa-external-link-alt"></i>
  </a>

<script>
chrome.runtime.sendMessage({ action: 'popupOpened' });

async function loadFeed() {
  try {
    const res = await fetch('https://gositeme.com/api/pulse.php?action=feed&limit=10', { credentials: 'include' });
    const data = await res.json();
    if (data.success && data.posts && data.posts.length) {
      document.getElementById('feed').innerHTML = data.posts.map(p => {
        const initials = (p.author_name || '?').split(' ').map(n => n[0]).join('').toUpperCase().slice(0,2);
        const timeAgo = getTimeAgo(p.created_at);
        return `<div class="post">
          <div class="post-header">
            <div class="post-avatar">${initials}</div>
            <div>
              <div class="post-name">${p.author_name || 'Anonymous'}</div>
              <div class="post-time">${timeAgo}</div>
            </div>
          </div>
          <div class="post-body">${escapeHtml(p.content || '')}</div>
          <div class="post-actions">
            <span class="post-action"><i class="far fa-heart"></i> ${p.likes || 0}</span>
            <span class="post-action"><i class="far fa-comment"></i> ${p.comments || 0}</span>
            <span class="post-action"><i class="fas fa-share"></i></span>
          </div>
        </div>`;
      }).join('');
    } else {
      document.getElementById('feed').innerHTML = '<div class="empty">Sign in at gositeme.com to see your feed</div>';
    }
  } catch(e) {
    document.getElementById('feed').innerHTML = '<div class="empty">Sign in at gositeme.com to see your feed</div>';
  }
}

async function createPost() {
  const input = document.getElementById('postInput');
  const content = input.value.trim();
  if (!content) return;
  try {
    await fetch('https://gositeme.com/api/pulse.php?action=post', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ content })
    });
    input.value = '';
    loadFeed();
  } catch(e) {}
}

function getTimeAgo(dateStr) {
  const diff = (Date.now() - new Date(dateStr).getTime()) / 1000;
  if (diff < 60) return 'just now';
  if (diff < 3600) return Math.floor(diff/60) + 'm';
  if (diff < 86400) return Math.floor(diff/3600) + 'h';
  return Math.floor(diff/86400) + 'd';
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

loadFeed();
</script>
</body>
</html>
