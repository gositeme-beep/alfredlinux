<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#060b18"/>
    </linearGradient>
    <linearGradient id="brain" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>
  <rect x="4" y="4" width="504" height="504" rx="106" fill="none" stroke="url(#ring)" stroke-width="5" opacity="0.7"/>

  <!-- Brain outline — left hemisphere -->
  <path d="M256 120 C200 120 150 155 140 210 C130 265 145 300 160 330 C175 360 200 385 230 395 C245 400 256 400 256 395"
    fill="none" stroke="url(#brain)" stroke-width="8" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Brain outline — right hemisphere -->
  <path d="M256 120 C312 120 362 155 372 210 C382 265 367 300 352 330 C337 360 312 385 282 395 C267 400 256 400 256 395"
    fill="none" stroke="url(#brain)" stroke-width="8" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Neural folds — left -->
  <path d="M175 200 C200 190 230 210 250 200" fill="none" stroke="url(#brain)" stroke-width="4" opacity="0.5" stroke-linecap="round"/>
  <path d="M165 250 C190 240 230 260 256 250" fill="none" stroke="url(#brain)" stroke-width="4" opacity="0.5" stroke-linecap="round"/>
  <path d="M175 300 C200 290 235 310 256 300" fill="none" stroke="url(#brain)" stroke-width="4" opacity="0.5" stroke-linecap="round"/>

  <!-- Neural folds — right -->
  <path d="M337 200 C312 190 282 210 262 200" fill="none" stroke="url(#brain)" stroke-width="4" opacity="0.5" stroke-linecap="round"/>
  <path d="M347 250 C322 240 282 260 256 250" fill="none" stroke="url(#brain)" stroke-width="4" opacity="0.5" stroke-linecap="round"/>
  <path d="M337 300 C312 290 277 310 256 300" fill="none" stroke="url(#brain)" stroke-width="4" opacity="0.5" stroke-linecap="round"/>

  <!-- Center divide -->
  <line x1="256" y1="130" x2="256" y2="390" stroke="url(#brain)" stroke-width="3" opacity="0.3"/>

  <!-- Neural spark nodes -->
  <circle cx="200" cy="180" r="5" fill="#818cf8" opacity="0.7" filter="url(#glow)"/>
  <circle cx="312" cy="180" r="5" fill="#818cf8" opacity="0.7" filter="url(#glow)"/>
  <circle cx="180" cy="270" r="4" fill="#a78bfa" opacity="0.6"/>
  <circle cx="332" cy="270" r="4" fill="#a78bfa" opacity="0.6"/>
  <circle cx="220" cy="350" r="4" fill="#c084fc" opacity="0.5"/>
  <circle cx="292" cy="350" r="4" fill="#c084fc" opacity="0.5"/>

  <!-- "A" letterform integrated subtly at center -->
  <text x="256" y="275" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="900" font-size="80" fill="url(#brain)" opacity="0.25">A</text>
</svg>
