<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1218"/>
      <stop offset="100%" style="stop-color:#060810"/>
    </linearGradient>
    <linearGradient id="game" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="50%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>
  <rect x="4" y="4" width="504" height="504" rx="106" fill="none" stroke="url(#ring)" stroke-width="5" opacity="0.7"/>

  <!-- Controller body -->
  <path d="M130 250 C130 200 170 180 210 190 L230 195 C245 198 267 198 282 195 L302 190 C342 180 382 200 382 250 C382 310 350 360 320 370 C300 376 290 355 270 340 L256 330 L242 340 C222 355 212 376 192 370 C162 360 130 310 130 250 Z"
    fill="none" stroke="url(#game)" stroke-width="8" filter="url(#glow)"/>

  <!-- Left D-pad -->
  <rect x="165" y="240" width="45" height="12" rx="3" fill="url(#game)" opacity="0.6"/>
  <rect x="182" y="224" width="12" height="45" rx="3" fill="url(#game)" opacity="0.6"/>

  <!-- Right buttons (A, B) -->
  <circle cx="340" cy="240" r="10" fill="url(#game)" opacity="0.6"/>
  <circle cx="365" cy="258" r="10" fill="url(#game)" opacity="0.6"/>
  <circle cx="340" cy="276" r="10" fill="url(#game)" opacity="0.4"/>
  <circle cx="315" cy="258" r="10" fill="url(#game)" opacity="0.4"/>

  <!-- Center button -->
  <circle cx="256" cy="230" r="14" fill="none" stroke="url(#game)" stroke-width="3" opacity="0.5"/>

  <!-- Shoulder buttons -->
  <rect x="150" y="180" width="50" height="10" rx="5" fill="url(#game)" opacity="0.35"/>
  <rect x="312" y="180" width="50" height="10" rx="5" fill="url(#game)" opacity="0.35"/>
</svg>
