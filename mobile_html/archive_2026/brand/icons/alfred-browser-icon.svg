<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0c29"/>
      <stop offset="50%" stop-color="#1a1a4e"/>
      <stop offset="100%" stop-color="#24243e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#00d2ff"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0%" stop-color="#667eea" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0f0c29" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-10%" y="-10%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="512" height="512" rx="108" ry="108" fill="url(#bg)"/>
  <rect x="0" y="0" width="512" height="512" rx="108" ry="108" fill="url(#glow)"/>

  <!-- Globe circle -->
  <circle cx="256" cy="256" r="150" fill="none" stroke="url(#accent)" stroke-width="4" opacity="0.45"/>

  <!-- Globe latitude lines -->
  <ellipse cx="256" cy="256" rx="150" ry="55" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.25"/>
  <ellipse cx="256" cy="256" rx="150" ry="100" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.2"/>

  <!-- Globe longitude lines -->
  <ellipse cx="256" cy="256" rx="55" ry="150" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.25"/>
  <ellipse cx="256" cy="256" rx="100" ry="150" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.2"/>

  <!-- Equator + meridian -->
  <line x1="106" y1="256" x2="406" y2="256" stroke="url(#accent)" stroke-width="2" opacity="0.25"/>
  <line x1="256" y1="106" x2="256" y2="406" stroke="url(#accent)" stroke-width="2" opacity="0.25"/>

  <!-- Shield -->
  <path d="M256 120 L350 170 L350 280 C350 340 310 385 256 408 C202 385 162 340 162 280 L162 170 Z"
        fill="none" stroke="url(#accent)" stroke-width="4.5" opacity="0.65" filter="url(#shadow)"/>
  <path d="M256 130 L342 177 L342 278 C342 333 305 375 256 396 C207 375 170 333 170 278 L170 177 Z"
        fill="url(#accent)" opacity="0.1"/>

  <!-- "A" monogram -->
  <text x="256" y="310" font-family="'SF Pro Display','Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="150" font-weight="800" fill="url(#accent)" text-anchor="middle"
        letter-spacing="-4" filter="url(#shadow)">A</text>
</svg>
