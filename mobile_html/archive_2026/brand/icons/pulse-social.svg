<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background gradient: deep dark teal to dark -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="50%" stop-color="#0d2137"/>
      <stop offset="100%" stop-color="#071320"/>
    </linearGradient>
    <!-- Accent gradient: teal to emerald -->
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <!-- Secondary accent: cyan to blue -->
    <linearGradient id="accent2" x1="0" y1="0.5" x2="1" y2="0.5">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <!-- Ring gradient -->
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="50%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <!-- Glow -->
    <radialGradient id="glow" cx="0.5" cy="0.45" r="0.4">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0a1628" stop-opacity="0"/>
    </radialGradient>
    <!-- Shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="8" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <!-- Pulse glow -->
    <filter id="pulse-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg)"/>
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#glow)"/>

  <!-- Outer ring -->
  <circle cx="256" cy="235" r="140" fill="none" stroke="url(#ring)" stroke-width="3" opacity="0.3"/>

  <!-- Inner ring -->
  <circle cx="256" cy="235" r="105" fill="none" stroke="url(#ring)" stroke-width="2.5" opacity="0.2"/>

  <!-- Pulse/heartbeat waveform -->
  <g filter="url(#pulse-glow)">
    <polyline points="80,250 140,250 165,250 185,250 200,250 215,190 230,310 248,170 265,320 280,195 295,260 310,240 330,250 350,250 380,250 432,250"
              fill="none" stroke="url(#accent2)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"
              filter="url(#shadow)"/>
  </g>

  <!-- Small repeating pulse (upper decorative) -->
  <polyline points="155,170 170,170 180,155 190,185 200,160 210,178 225,170 240,170"
            fill="none" stroke="url(#accent)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.25"/>

  <!-- Small repeating pulse (lower decorative) -->
  <polyline points="270,310 285,310 295,295 305,325 315,300 325,318 340,310 355,310"
            fill="none" stroke="url(#accent)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.25"/>

  <!-- Center pulsing dot -->
  <circle cx="256" cy="235" r="18" fill="url(#accent)" opacity="0.2"/>
  <circle cx="256" cy="235" r="10" fill="url(#accent)" opacity="0.4"/>
  <circle cx="256" cy="235" r="5" fill="#fff" opacity="0.9"/>

  <!-- Connection nodes (people dots) -->
  <g opacity="0.5">
    <!-- Top -->
    <circle cx="256" cy="120" r="8" fill="url(#accent)" opacity="0.6"/>
    <line x1="256" y1="128" x2="256" y2="220" stroke="url(#accent)" stroke-width="1" opacity="0.2"/>
    <!-- Right -->
    <circle cx="375" cy="200" r="7" fill="url(#accent)" opacity="0.5"/>
    <line x1="368" y1="204" x2="266" y2="232" stroke="url(#accent)" stroke-width="1" opacity="0.2"/>
    <!-- Left -->
    <circle cx="140" cy="205" r="7" fill="url(#accent)" opacity="0.5"/>
    <line x1="147" y1="208" x2="246" y2="233" stroke="url(#accent)" stroke-width="1" opacity="0.2"/>
    <!-- Bottom left -->
    <circle cx="170" cy="335" r="6" fill="url(#accent)" opacity="0.4"/>
    <line x1="175" y1="330" x2="250" y2="242" stroke="url(#accent)" stroke-width="1" opacity="0.15"/>
    <!-- Bottom right -->
    <circle cx="345" cy="330" r="6" fill="url(#accent)" opacity="0.4"/>
    <line x1="340" y1="325" x2="262" y2="242" stroke="url(#accent)" stroke-width="1" opacity="0.15"/>
  </g>

  <!-- Bottom text: PULSE -->
  <text x="256" y="440" font-family="'SF Pro Display', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="46" font-weight="700" fill="#ffffff" text-anchor="middle"
        letter-spacing="16" opacity="0.85">PULSE</text>

  <!-- Subtle bottom accent line -->
  <line x1="170" y1="458" x2="342" y2="458" stroke="url(#accent)" stroke-width="2" opacity="0.4" stroke-linecap="round"/>
</svg>
