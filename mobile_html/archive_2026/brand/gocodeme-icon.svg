<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1a12"/>
      <stop offset="100%" style="stop-color:#060f0a"/>
    </linearGradient>
    <linearGradient id="code" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="50%" style="stop-color:#34d399"/>
      <stop offset="100%" style="stop-color:#6ee7b7"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>
  <rect x="4" y="4" width="504" height="504" rx="106" fill="none" stroke="url(#ring)" stroke-width="5" opacity="0.7"/>

  <!-- Left angle bracket < -->
  <polyline points="200,180 120,260 200,340" fill="none" stroke="url(#code)" stroke-width="22" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

  <!-- Right angle bracket > -->
  <polyline points="312,180 392,260 312,340" fill="none" stroke="url(#code)" stroke-width="22" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

  <!-- Slash / in center -->
  <line x1="275" y1="160" x2="237" y2="360" stroke="url(#code)" stroke-width="14" stroke-linecap="round" opacity="0.7" filter="url(#glow)"/>

  <!-- Cursor blink line -->
  <rect x="247" y="380" width="18" height="4" rx="2" fill="url(#code)" opacity="0.6"/>

  <!-- Small dot accents (code nodes) -->
  <circle cx="160" cy="160" r="6" fill="#34d399" opacity="0.3"/>
  <circle cx="352" cy="160" r="6" fill="#34d399" opacity="0.3"/>
  <circle cx="160" cy="370" r="5" fill="#10b981" opacity="0.25"/>
  <circle cx="352" cy="370" r="5" fill="#10b981" opacity="0.25"/>
</svg>
