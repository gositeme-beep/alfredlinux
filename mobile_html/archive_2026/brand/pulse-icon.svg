<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a2e"/>
      <stop offset="100%" style="stop-color:#0a0618"/>
    </linearGradient>
    <linearGradient id="pulse" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f43f5e"/>
      <stop offset="50%" style="stop-color:#ec4899"/>
      <stop offset="100%" style="stop-color:#d946ef"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f43f5e"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>
  <rect x="4" y="4" width="504" height="504" rx="106" fill="none" stroke="url(#ring)" stroke-width="6" opacity="0.8"/>

  <!-- Heartbeat line — the signature pulse wave -->
  <polyline points="60,280 140,280 170,280 195,180 220,380 245,200 270,340 295,250 320,280 350,280 452,280"
    fill="none" stroke="url(#pulse)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

  <!-- Heart shape above the pulse line -->
  <g transform="translate(256, 170) scale(0.65)" filter="url(#glow)">
    <path d="M0 30 C0 30 -60 -30 -60 -55 C-60 -85 -30 -95 0 -65 C30 -95 60 -85 60 -55 C60 -30 0 30 0 30 Z"
      fill="url(#pulse)" opacity="0.9"/>
  </g>

  <!-- Connection dots — people/social nodes -->
  <circle cx="100" cy="150" r="12" fill="url(#pulse)" opacity="0.35"/>
  <circle cx="412" cy="150" r="12" fill="url(#pulse)" opacity="0.35"/>
  <circle cx="100" cy="400" r="10" fill="url(#pulse)" opacity="0.25"/>
  <circle cx="412" cy="400" r="10" fill="url(#pulse)" opacity="0.25"/>

  <!-- Thin connection lines from heart to nodes -->
  <line x1="220" y1="145" x2="112" y2="150" stroke="url(#pulse)" stroke-width="1.5" opacity="0.2"/>
  <line x1="292" y1="145" x2="400" y2="150" stroke="url(#pulse)" stroke-width="1.5" opacity="0.2"/>
</svg>
