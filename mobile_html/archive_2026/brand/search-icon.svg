<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1a1f"/>
      <stop offset="100%" style="stop-color:#060d12"/>
    </linearGradient>
    <linearGradient id="search" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="50%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#22d3ee"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>
  <rect x="4" y="4" width="504" height="504" rx="106" fill="none" stroke="url(#ring)" stroke-width="5" opacity="0.7"/>

  <!-- Magnifying glass circle -->
  <circle cx="225" cy="225" r="95" fill="none" stroke="url(#search)" stroke-width="14" filter="url(#glow)"/>

  <!-- Magnifying glass handle -->
  <line x1="295" y1="295" x2="400" y2="400" stroke="url(#search)" stroke-width="20" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Eye inside magnifying glass (sovereign/privacy) -->
  <ellipse cx="225" cy="225" rx="48" ry="28" fill="none" stroke="url(#search)" stroke-width="4" opacity="0.5"/>
  <circle cx="225" cy="225" r="14" fill="url(#search)" opacity="0.4"/>
  <circle cx="225" cy="225" r="6" fill="url(#search)" opacity="0.8"/>

  <!-- Search cursor line -->
  <line x1="180" y1="270" x2="270" y2="270" stroke="url(#search)" stroke-width="3" opacity="0.3" stroke-linecap="round"/>
</svg>
