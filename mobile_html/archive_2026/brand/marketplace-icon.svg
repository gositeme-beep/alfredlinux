<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#150a1e"/>
      <stop offset="100%" style="stop-color:#0a0512"/>
    </linearGradient>
    <linearGradient id="market" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f472b6"/>
      <stop offset="50%" style="stop-color:#e879f9"/>
      <stop offset="100%" style="stop-color:#c084fc"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>
  <rect x="4" y="4" width="504" height="504" rx="106" fill="none" stroke="url(#ring)" stroke-width="5" opacity="0.7"/>

  <!-- Store/shop roof -->
  <path d="M100 220 L256 120 L412 220" fill="none" stroke="url(#market)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

  <!-- Awning scallops -->
  <path d="M110 220 C130 250 170 250 190 220 C210 250 250 250 270 220 C290 250 330 250 350 220 C370 250 390 250 402 220"
    fill="none" stroke="url(#market)" stroke-width="5" opacity="0.6"/>

  <!-- Store body -->
  <rect x="130" y="230" width="252" height="170" rx="8" fill="none" stroke="url(#market)" stroke-width="5" opacity="0.5" filter="url(#glow)"/>

  <!-- Store door -->
  <rect x="222" y="300" width="68" height="100" rx="6" fill="none" stroke="url(#market)" stroke-width="4" opacity="0.6"/>
  <circle cx="280" cy="350" r="4" fill="url(#market)" opacity="0.7"/>

  <!-- Left window -->
  <rect x="150" y="260" width="55" height="50" rx="4" fill="none" stroke="url(#market)" stroke-width="3" opacity="0.4"/>

  <!-- Right window -->
  <rect x="310" y="260" width="55" height="50" rx="4" fill="none" stroke="url(#market)" stroke-width="3" opacity="0.4"/>

  <!-- Shopping bag tag -->
  <circle cx="256" cy="170" r="12" fill="url(#market)" opacity="0.4"/>
</svg>
